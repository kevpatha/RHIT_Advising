<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME Course Planner — Rose-Hulman</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ee; --surface:#fff; --surface2:#f0ede6; --border:#d6d0c4; --border-strong:#b0a898;
  --text:#1a1814; --text-muted:#6b6459; --text-faint:#9e9589;
  --accent:#8B1A1A; --accent-light:#f5e8e8; --accent-mid:#c43030;
  --green:#1a5c2a; --green-mid:#2a8c42; --blue:#1a3a5c;
  --amber:#7a4a00; --amber-light:#fff8e8; --amber-border:#e0c060;
  --purple:#5a1a7a; --purple-light:#f3e8fa;
  --teal:#0a5c4a; --teal-light:#e0f5f0;
  --font:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace; --radius:4px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}

header{background:var(--accent);color:white;padding:11px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;border-bottom:2px solid #6a1010;}
header h1{font-size:15px;font-weight:600;letter-spacing:.02em;}
header .sep{color:rgba(255,255,255,.3);}
header .sub{font-size:11px;color:rgba(255,255,255,.65);font-family:var(--mono);}
.mode-tabs{margin-left:auto;display:flex;gap:3px;}
.mode-tab{padding:5px 13px;border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.75);background:transparent;transition:all .15s;font-family:var(--font);}
.mode-tab.active{background:white;color:var(--accent);border-color:white;}
.mode-tab:hover:not(.active){background:rgba(255,255,255,.15);color:white;}

.app{display:flex;height:calc(100vh - 45px);overflow:hidden;}

/* LEFT */
.left-panel{width:310px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.panel-header{padding:9px 14px 7px;border-bottom:1px solid var(--border);background:var(--surface2);}
.panel-header h2{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-muted);}
.config-row{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.config-row label{font-size:11px;color:var(--text-muted);white-space:nowrap;font-weight:500;min-width:94px;}
.config-row select,.config-row input[type=number]{font-family:var(--font);font-size:12px;padding:4px 7px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);flex:1;}
.config-row select:focus,.config-row input:focus{outline:2px solid var(--accent);border-color:transparent;}
.toggle-group{display:flex;border:1px solid var(--border-strong);border-radius:var(--radius);overflow:hidden;flex:1;}
.toggle-opt{flex:1;padding:4px 3px;font-family:var(--font);font-size:10px;cursor:pointer;border:none;background:var(--surface);color:var(--text-muted);transition:all .15s;line-height:1.2;text-align:center;}
.toggle-opt+.toggle-opt{border-left:1px solid var(--border-strong);}
.toggle-opt.active{background:var(--accent);color:white;font-weight:600;}
.counter-ctrl{display:flex;align-items:center;gap:5px;flex:1;}
.counter-btn{width:19px;height:19px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--text-muted);user-select:none;flex-shrink:0;}
.counter-btn:hover{background:var(--surface2);}
.counter-btn:disabled{opacity:.3;cursor:default;}
.counter-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);min-width:14px;text-align:center;}
.counter-of{font-size:10px;color:var(--text-faint);font-family:var(--mono);}
.course-list{flex:1;overflow-y:auto;padding:4px 0;}
.year-group{margin-bottom:2px;}
.year-label{padding:5px 14px 3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);font-family:var(--mono);position:sticky;top:0;background:var(--surface);z-index:1;border-bottom:1px solid var(--border);}
.course-item{display:flex;align-items:center;gap:8px;padding:4px 14px;cursor:pointer;}
.course-item:hover{background:var(--surface2);}
.course-item.s1{background:var(--amber-light);}
.course-item.s2{opacity:.42;}
.state-btn{width:15px;height:15px;border-radius:2px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;user-select:none;border:1.5px solid var(--border-strong);background:var(--surface);color:transparent;}
.state-btn.s1{border:1.5px dashed var(--amber);background:var(--amber-light);color:var(--amber);font-weight:700;}
.state-btn.s2{border-color:var(--accent);background:var(--accent);color:white;font-weight:700;}
.state-hint{font-size:9px;color:var(--text-faint);padding:3px 14px;font-style:italic;border-bottom:1px solid var(--border);}
.course-info{flex:1;min-width:0;}
.course-id{font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:500;}
.course-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.course-credits{font-family:var(--mono);font-size:10px;color:var(--text-faint);flex-shrink:0;}
.action-bar{padding:9px 14px;border-top:1px solid var(--border);display:flex;gap:6px;}
.btn{flex:1;padding:7px 10px;border-radius:var(--radius);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border-strong);transition:all .15s;}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-mid);}
.btn-secondary{background:var(--surface);color:var(--text);}
.btn-secondary:hover{background:var(--surface2);}

/* RIGHT */
.right-panel,.build-panel{flex:1;overflow:auto;padding:16px 20px;display:flex;flex-direction:column;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-faint);gap:10px;text-align:center;padding:40px;}
.empty-state .icon{font-size:36px;opacity:.35;}
.empty-state p{font-size:13px;max-width:300px;line-height:1.6;}

/* PLAN GRID */
.plan-container{display:flex;flex-direction:column;}
.plan-year-header{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);font-family:var(--mono);padding:16px 0 5px;border-bottom:2px solid var(--border-strong);}
.plan-year-header:first-child{padding-top:0;}
.plan-year-header.extended{color:var(--amber);}
.quarters-row{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
.quarter-col{padding:10px 12px;border-right:1px solid var(--border);min-height:90px;}
.quarter-col:last-child{border-right:none;}
.quarter-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;}
.quarter-name{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);}
.quarter-credits{font-family:var(--mono);font-size:10px;}
.quarter-credits.over{color:var(--accent);font-weight:600;}
.quarter-credits.under{color:var(--amber);font-weight:600;}
.quarter-credits.ok{color:var(--green-mid);}
.course-cards{display:flex;flex-direction:column;gap:4px;}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;border-left:3px solid var(--border-strong);}
.plan-card.core{border-left-color:var(--accent);}
.plan-card.hssa{border-left-color:var(--blue);}
.plan-card.capstone{border-left-color:#8B4513;}
.plan-card.elective-hssa{border-left-color:var(--blue);}
.plan-card.elective-tech{border-left-color:var(--green-mid);}
.plan-card.elective-ms{border-left-color:var(--purple);}
.plan-card.elective-free{border-left-color:var(--teal);}
.plan-card-id{font-family:var(--mono);font-size:9px;color:var(--text-faint);}
.plan-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-top:1px;}
.plan-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:3px;}
.plan-card-cr{font-family:var(--mono);font-size:9px;color:var(--text-faint);}
.alt-badge{font-size:9px;padding:1px 4px;border-radius:2px;background:var(--amber-light);color:var(--amber);font-family:var(--mono);border:1px solid var(--amber-border);}
.delayed-badge{font-size:9px;padding:1px 4px;border-radius:2px;background:var(--purple-light);color:var(--purple);font-family:var(--mono);border:1px solid #c8a0e8;}
.no-courses{font-size:11px;color:var(--text-faint);font-style:italic;}
.current-marker{font-size:9px;background:var(--accent);color:white;padding:1px 5px;border-radius:2px;margin-left:6px;font-family:var(--mono);vertical-align:middle;}
.summary-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;margin-bottom:10px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.summary-stat{font-size:11px;color:var(--text-muted);}
.summary-stat strong{color:var(--text);font-weight:600;}
.info-box{border-radius:var(--radius);padding:7px 12px;margin-bottom:8px;font-size:11px;}
.info-box.amber{background:var(--amber-light);border:1px solid var(--amber-border);color:var(--amber);}
.info-box.red{background:var(--accent-light);border:1px solid #e8c0c0;color:var(--accent);}
.info-box.purple{background:var(--purple-light);border:1px solid #c8a0e8;color:var(--purple);}
.info-box strong{font-weight:600;}
.legend{display:flex;gap:12px;padding:12px 0 4px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-muted);}
.legend-dot{width:9px;height:9px;border-radius:1px;flex-shrink:0;}

/* BUILD MODE */
.build-quarter{padding:10px 12px;border-right:1px solid var(--border);min-height:120px;display:flex;flex-direction:column;gap:5px;}
.build-quarter:last-child{border-right:none;}
.build-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 7px;display:flex;align-items:flex-start;gap:4px;}
.build-card.err-prereq{background:var(--accent-light);border-color:#e8b0b0;}
.build-card.err-avail{background:var(--amber-light);border-color:var(--amber-border);}
.build-card.err-both{background:#fdf0f0;border-color:#e8b0b0;}
.build-card-body{flex:1;min-width:0;}
.build-card-id{font-family:var(--mono);font-size:9px;color:var(--text-faint);}
.build-card-name{font-size:11px;color:var(--text);line-height:1.2;}
.build-card-cr{font-family:var(--mono);font-size:9px;color:var(--text-faint);margin-top:1px;}
.build-err{font-size:9px;color:var(--accent);margin-top:2px;line-height:1.3;}
.build-warn{font-size:9px;color:var(--amber);margin-top:2px;line-height:1.3;}
.remove-btn{width:14px;height:14px;border:none;background:none;cursor:pointer;color:var(--text-faint);font-size:13px;line-height:1;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:2px;}
.remove-btn:hover{background:var(--accent-light);color:var(--accent);}
.add-select{width:100%;font-family:var(--font);font-size:10px;padding:3px 5px;border:1px dashed var(--border-strong);border-radius:var(--radius);background:var(--surface2);color:var(--text-muted);cursor:pointer;margin-top:2px;}
.add-select:focus{outline:2px solid var(--accent);}
.build-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.req-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--mono);font-weight:500;}
.req-badge.met{background:var(--teal-light);color:var(--teal);}
.req-badge.unmet{background:var(--accent-light);color:var(--accent);}
.req-badge.partial{background:var(--amber-light);color:var(--amber);}
.build-cr-ok{color:var(--green-mid);}
.build-cr-over{color:var(--accent);font-weight:600;}
.build-cr-under{color:var(--amber);font-weight:600;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<header>
  <h1>ME Course Planner</h1>
  <span class="sep">|</span>
  <span class="sub">Rose-Hulman Institute of Technology</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-suggest" onclick="switchMode('suggest')">Suggest plan</button>
    <button class="mode-tab" id="tab-build"   onclick="switchMode('build')">Custom build</button>
  </div>
</header>

<div class="app">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-header"><h2>Courses &amp; Settings</h2></div>

    <div class="config-row">
      <label>Upcoming quarter</label>
      <select id="startQuarter"><option>Fall</option><option>Winter</option><option>Spring</option></select>
    </div>
    <div class="config-row">
      <label>Year standing</label>
      <select id="startYear">
        <option>Freshman</option><option>Sophomore</option>
        <option>Junior</option><option>Senior</option>
        <option>5th Year</option><option>6th Year</option>
      </select>
    </div>
    <div class="config-row" id="targetRow">
      <label>Target cr/quarter</label>
      <input type="number" id="targetCredits" value="16" min="12" max="18" style="width:50px;flex:none;">
      <span style="font-size:10px;color:var(--text-faint);">(12–18)</span>
    </div>
    <div class="config-row">
      <label>Control course</label>
      <div class="toggle-group">
        <button class="toggle-opt active" data-val="EM 306" onclick="setControl('EM 306')">EM 306<br>Vibrations</button>
        <button class="toggle-opt"        data-val="ME 306" onclick="setControl('ME 306')">ME 306<br>Controls</button>
      </div>
    </div>
    <div class="config-row">
      <label>HSSA electives</label>
      <div class="counter-ctrl">
        <button class="counter-btn" id="hssaMinus" onclick="changeCounter('hssa',-1)">−</button>
        <span class="counter-val" id="hssaVal">0</span>
        <button class="counter-btn" id="hssaPlus"  onclick="changeCounter('hssa', 1)">+</button>
        <span class="counter-of">/ 6 needed</span>
      </div>
    </div>
    <div class="config-row">
      <label>Tech electives</label>
      <div class="counter-ctrl">
        <button class="counter-btn" id="techMinus" onclick="changeCounter('tech',-1)">−</button>
        <span class="counter-val" id="techVal">0</span>
        <button class="counter-btn" id="techPlus"  onclick="changeCounter('tech', 1)">+</button>
        <span class="counter-of">/ 3 needed</span>
      </div>
    </div>
    <div class="config-row">
      <label>Math/sci elective</label>
      <div class="counter-ctrl">
        <button class="counter-btn" id="msMinus" onclick="changeCounter('ms',-1)">−</button>
        <span class="counter-val" id="msVal">0</span>
        <button class="counter-btn" id="msPlus"  onclick="changeCounter('ms', 1)">+</button>
        <span class="counter-of">/ 1 needed</span>
      </div>
    </div>
    <div class="config-row">
      <label>Free electives</label>
      <div class="counter-ctrl">
        <button class="counter-btn" id="freeMinus" onclick="changeCounter('free',-1)">−</button>
        <span class="counter-val" id="freeVal">0</span>
        <button class="counter-btn" id="freePlus"  onclick="changeCounter('free', 1)">+</button>
        <span class="counter-of">/ 2 needed</span>
      </div>
    </div>

    <div class="state-hint">Click course: □ none → ◐ in progress → ✓ done</div>
    <div class="course-list" id="courseList"></div>

    <div class="action-bar">
      <button class="btn btn-secondary" onclick="clearAll()">Clear all</button>
      <button class="btn btn-primary" id="mainBtn" onclick="handleMain()">Generate plan →</button>
    </div>
  </div>

  <!-- SUGGEST PANEL -->
  <div class="right-panel" id="suggestPanel">
    <div class="empty-state">
      <div class="icon">◳</div>
      <p>Mark completed courses on the left, set your upcoming quarter and year, then click <strong>Generate plan</strong>.</p>
    </div>
  </div>

  <!-- BUILD PANEL -->
  <div class="build-panel" id="buildPanel" style="display:none;"></div>
</div>

<script>

  // Senior
  {id:"ME 421",   title:"ME Lab",                              cr:2, year:"Senior",    primary:"Fall",               alt:"Winter",      prereqs:[["ME 321"],["ENGL H290"]], type:"core"},
  {id:"ME 470",   title:"Capstone Design I",                   cr:4, year:"Senior",    primary:"Fall",               alt:"Spring",      prereqs:[["ME 230"],["ME 302"],["ME 321"],["ME 380"]], type:"capstone"},
  {id:"ME 471",   title:"Capstone Design II",                  cr:4, year:"Senior",    primary:"Winter",             alt:"Fall",        prereqs:[["ME 470"]], type:"capstone"},
  {id:"ME 472",   title:"Capstone Design III",                 cr:4, year:"Senior",    primary:"Spring",             alt:"Winter",      prereqs:[["ME 471"]], type:"capstone"},
];

// Elective requirements (from degree plan CSV)
const ELEC_REQ   = {hssa:6, tech:3, ms:1, free:2};
const ELEC_META  = {
  hssa:{label:"HSSA Elective",       type:"elective-hssa", cr:4},
  tech:{label:"Technical Elective",  type:"elective-tech", cr:4},
  ms:  {label:"Math/Sci Elective",   type:"elective-ms",   cr:4},
  free:{label:"Free Elective",       type:"elective-free", cr:4},
};

const QUARTERS = ["Fall","Winter","Spring"];
const YEAR_NAMES = ["Freshman","Sophomore","Junior","Senior","5th Year","6th Year"];

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let courseStates = {};          // id -> 0 (none), 1 (in-progress), 2 (done)
let electiveDone = {hssa:0, tech:0, ms:0, free:0};
let controlChoice = "EM 306";
let currentMode = "suggest";

// Build grid: 6 years × 3 quarters, each cell = array of slot objects
// slot: {kind:"course"|"elective", id, electiveType?}
let buildGrid = [];
function initGrid() {
  buildGrid = [];
  for (let y = 0; y < 6; y++) buildGrid.push([[],[],[]]);
}
initGrid();

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function getState(id) { return courseStates[id] || 0; }

function satisfied() {
  return new Set(COURSES.filter(c => getState(c.id) >= 1).map(c => c.id));
}

function prereqsMet(course, sat) {
  if (!course.prereqs || !course.prereqs.length) return true;
  return course.prereqs.every(grp => grp.some(id => sat.has(id)));
}

function availInQ(course, q) {
  const all = (course.primary + (course.alt ? "|" + course.alt : "")).split("|");
  return all.includes(q);
}

function isAlt(course, q) {
  return !course.primary.split("|").includes(q);
}

function courseById(id) { return COURSES.find(c => c.id === id); }

function allQuartersFrom(startYrName, startQName) {
  // Generate up to 6 years × 3 quarters
  const sy = YEAR_NAMES.indexOf(startYrName);
  const sq = QUARTERS.indexOf(startQName);
  const result = [];
  for (let yi = sy; yi < YEAR_NAMES.length; yi++) {
    for (let qi = (yi === sy ? sq : 0); qi < QUARTERS.length; qi++) {
      result.push({ year: YEAR_NAMES[yi], quarter: QUARTERS[qi], yi, qi });
    }
  }
  return result;
}

// ═══════════════════════════════════════════════════════════
//  MODE SWITCHING
// ═══════════════════════════════════════════════════════════
function switchMode(mode) {
  currentMode = mode;
  document.getElementById("tab-suggest").classList.toggle("active", mode === "suggest");
  document.getElementById("tab-build").classList.toggle("active",   mode === "build");
  document.getElementById("suggestPanel").style.display = mode === "suggest" ? "flex" : "none";
  document.getElementById("buildPanel").style.display   = mode === "build"   ? "flex" : "none";
  document.getElementById("targetRow").style.display    = mode === "suggest" ? "" : "none";
  document.getElementById("mainBtn").textContent = mode === "suggest" ? "Generate plan →" : "Validate plan ✓";
  if (mode === "build") renderBuild();
}

function handleMain() {
  if (currentMode === "suggest") generatePlan();
  else renderBuild(true);
}

// ═══════════════════════════════════════════════════════════
//  LEFT PANEL CONTROLS
// ═══════════════════════════════════════════════════════════
function setControl(val) {
  controlChoice = val;
  document.querySelectorAll(".toggle-opt").forEach(b =>
    b.classList.toggle("active", b.dataset.val === val));
  buildCourseList();
  if (currentMode === "build") renderBuild();
}

function changeCounter(key, d) {
  electiveDone[key] = Math.max(0, Math.min(ELEC_REQ[key], electiveDone[key] + d));
  document.getElementById(key + "Val").textContent = electiveDone[key];
  syncCounterBtns();
}

function syncCounterBtns() {
  Object.keys(ELEC_REQ).forEach(k => {
    document.getElementById(k + "Minus").disabled = electiveDone[k] === 0;
    document.getElementById(k + "Plus").disabled  = electiveDone[k] === ELEC_REQ[k];
  });
}

function cycleState(id) {
  courseStates[id] = ((courseStates[id] || 0) + 1) % 3;
  if (!courseStates[id]) delete courseStates[id];
  buildCourseList();
  if (currentMode === "build") renderBuild();
}

function buildCourseList() {
  const list = document.getElementById("courseList");
  list.innerHTML = "";
  ["Freshman","Sophomore","Junior","Senior"].forEach(yr => {
    const courses = COURSES.filter(c => {
      if (c.year !== yr) return false;
      if (c.id === "EM 306" && controlChoice !== "EM 306") return false;
      if (c.id === "ME 306" && controlChoice !== "ME 306") return false;
      return true;
    });
    if (!courses.length) return;
    const g = document.createElement("div"); g.className = "year-group";
    const lbl = document.createElement("div"); lbl.className = "year-label"; lbl.textContent = yr;
    g.appendChild(lbl);
    courses.forEach(c => {
      const st = getState(c.id);
      const item = document.createElement("div");
      item.className = "course-item s" + st;
      const safe = c.id.replace(/'/g, "\\'");
      item.innerHTML = `<div class="state-btn s${st}" onclick="cycleState('${safe}')">${st===0?"":st===1?"–":"✓"}</div>
        <div class="course-info"><div class="course-id">${c.id}</div><div class="course-name">${c.title}</div></div>
        <div class="course-credits">${c.cr}cr</div>`;
      g.appendChild(item);
    });
    list.appendChild(g);
  });
  syncCounterBtns();
}

function clearAll() {
  courseStates = {};
  electiveDone = {hssa:0,tech:0,ms:0,free:0};
  Object.keys(ELEC_REQ).forEach(k => document.getElementById(k+"Val").textContent = 0);
  syncCounterBtns();
  initGrid();
  buildCourseList();
  if (currentMode === "suggest") {
    document.getElementById("suggestPanel").innerHTML = `<div class="empty-state"><div class="icon">◳</div><p>Mark completed courses on the left, set your upcoming quarter and year, then click <strong>Generate plan</strong>.</p></div>`;
  } else renderBuild();
}

// ═══════════════════════════════════════════════════════════
//  SUGGEST MODE — scheduler
// ═══════════════════════════════════════════════════════════
function generatePlan() {
  const startQ  = document.getElementById("startQuarter").value;
  const startYr = document.getElementById("startYear").value;
  const target  = Math.max(12, Math.min(18, parseInt(document.getElementById("targetCredits").value) || 16));

  const allQ = allQuartersFrom(startYr, startQ);

  // Courses needing scheduling (state=0, excluding unchosen control)
  let needed = COURSES.filter(c => {
    if (getState(c.id) !== 0) return false;
    if (c.id === "EM 306" && controlChoice !== "EM 306") return false;
    if (c.id === "ME 306" && controlChoice !== "ME 306") return false;
    return true;
  });

  // Electives still needed
  let eLeft = {};
  Object.keys(ELEC_REQ).forEach(k => eLeft[k] = Math.max(0, ELEC_REQ[k] - electiveDone[k]));

  // Prereq seed: in-progress + done courses count as satisfied
  let sat = satisfied();
  let remaining = [...needed];
  let eScheduled = {hssa:0, tech:0, ms:0, free:0};
  const schedule = [];

  // Track which courses were delayed past their "standard" year
  const standardYear = {};
  COURSES.forEach(c => { standardYear[c.id] = YEAR_NAMES.indexOf(c.year); });
  const delayed = new Set();

  for (const {year, quarter, yi} of allQ) {
    const qCourses = [];
    let qCr = 0;

    // Eligible: available this quarter AND prereqs met
    const eligible = remaining.filter(c =>
      availInQ(c, quarter) && prereqsMet(c, sat)
    );

    // Sort: courses whose standard year has passed get priority (delayed first),
    // then by standard year ascending, capstones last, primary before alt
    eligible.sort((a, b) => {
      const aStd = standardYear[a.id] ?? 99;
      const bStd = standardYear[b.id] ?? 99;
      const aCurrent = YEAR_NAMES.indexOf(year);
      const aDelayed = aStd < aCurrent ? 1 : 0;
      const bDelayed = bStd < aCurrent ? 1 : 0;
      // Delayed courses first
      if (aDelayed !== bDelayed) return bDelayed - aDelayed;
      // Then by standard year
      if (aStd !== bStd) return aStd - bStd;
      // Capstones last
      if (a.type === "capstone" && b.type !== "capstone") return 1;
      if (b.type === "capstone" && a.type !== "capstone") return -1;
      // Primary quarter before alt
      return (isAlt(a,quarter)?1:0) - (isAlt(b,quarter)?1:0);
    });

    for (const c of eligible) {
      if (qCr + c.cr > 18) continue;
      // Mark as delayed if being placed after its standard year
      const cStd = standardYear[c.id] ?? 99;
      if (YEAR_NAMES.indexOf(year) > cStd) delayed.add(c.id);
      qCourses.push(c);
      qCr += c.cr;
      sat = new Set([...sat, c.id]);
      remaining = remaining.filter(x => x.id !== c.id);
      if (qCr >= target) break;
    }

    // Fill electives — distribute sensibly
    // HSSA: anytime there's space
    while (eScheduled.hssa < eLeft.hssa && qCr + 4 <= 18) {
      qCourses.push({id:"HSSA Elective", title:"HSSA Elective", cr:4, type:"elective-hssa"});
      qCr += 4; eScheduled.hssa++;
      if (qCr >= target) break;
    }
    // Tech electives: senior+ years
    const isSeniorPlus = YEAR_NAMES.indexOf(year) >= 3;
    if (isSeniorPlus) {
      while (eScheduled.tech < eLeft.tech && qCr + 4 <= 18) {
        qCourses.push({id:"Tech Elective", title:"Technical Elective", cr:4, type:"elective-tech"});
        qCr += 4; eScheduled.tech++;
        if (qCr >= target) break;
      }
      // Math/sci elective: senior+
      if (eScheduled.ms < eLeft.ms && qCr + 4 <= 18) {
        qCourses.push({id:"Math/Sci Elective", title:"Math/Science Elective", cr:4, type:"elective-ms"});
        qCr += 4; eScheduled.ms++;
      }
    }
    // Free electives: junior+ years
    if (YEAR_NAMES.indexOf(year) >= 2) {
      while (eScheduled.free < eLeft.free && qCr + 4 <= 18) {
        qCourses.push({id:"Free Elective", title:"Free Elective", cr:4, type:"elective-free"});
        qCr += 4; eScheduled.free++;
        if (qCr >= target) break;
      }
    }

    if (qCourses.length > 0) {
      schedule.push({year, quarter, courses: qCourses, credits: qCr});
    }

    const allDone = remaining.length === 0 &&
      Object.keys(eLeft).every(k => eScheduled[k] >= eLeft[k]);
    if (allDone) break;
  }

  renderSuggest(schedule, startQ, startYr, target, delayed);
}

// ═══════════════════════════════════════════════════════════
//  SUGGEST MODE — render
// ═══════════════════════════════════════════════════════════
function renderSuggest(schedule, startQ, startYr, target, delayed) {
  const panel = document.getElementById("suggestPanel");

  const byYear = {};
  schedule.forEach(q => { (byYear[q.year] = byYear[q.year] || []).push(q); });

  const totRemaining = schedule.reduce((s,q) => s + q.credits, 0);
  const totCompleted = COURSES.reduce((s,c) => getState(c.id) === 2 ? s + c.cr : s, 0)
    + Object.entries(electiveDone).reduce((s,[k,v]) => s + v * 4, 0);

  const inProg = COURSES.filter(c => getState(c.id) === 1);
  const extendedYears = schedule.filter(q => YEAR_NAMES.indexOf(q.year) >= 4).map(q=>q.year);
  const uniqueExtended = [...new Set(extendedYears)];

  let html = `<div class="plan-container">`;

  html += `<div class="summary-bar">
    <span class="summary-stat"><strong>${schedule.length}</strong> quarters planned</span>
    <span class="summary-stat"><strong>${totRemaining}</strong> cr remaining</span>
    <span class="summary-stat"><strong>${totCompleted}</strong> cr completed</span>
    <span class="summary-stat">Target <strong>${target}</strong> cr/qtr</span>
    <span class="summary-stat">Control: <strong>${controlChoice}</strong></span>
  </div>`;

  if (inProg.length) {
    html += `<div class="info-box amber"><strong>In progress:</strong> ${inProg.map(c=>c.id).join(", ")} — treated as complete for prerequisites.</div>`;
  }
  if (delayed.size) {
    const names = [...delayed].join(", ");
    html += `<div class="info-box purple"><strong>Rescheduled courses</strong> (placed later than standard due to unmet prerequisites or credit limits): ${names}. Marked with a <span style="background:var(--purple-light);color:var(--purple);font-family:var(--mono);font-size:10px;padding:1px 4px;border-radius:2px;">delayed</span> badge.</div>`;
  }
  if (uniqueExtended.length) {
    html += `<div class="info-box amber"><strong>Extended enrollment required:</strong> This plan runs into ${uniqueExtended.join(" and ")} to complete all requirements. Consider adjusting course load or credit target.</div>`;
  }
  if (schedule.some(q => q.credits < 12 || q.credits > 18)) {
    html += `<div class="info-box red"><strong>Note:</strong> Some quarters fall outside the 12–18 credit window due to prerequisite constraints.</div>`;
  }

  // Group and render by year
  const yearsToShow = [...new Set(schedule.map(q => q.year))];
  yearsToShow.forEach(yr => {
    const qs = byYear[yr];
    if (!qs || !qs.length) return;
    const isExt = YEAR_NAMES.indexOf(yr) >= 4;
    html += `<div class="plan-year-header ${isExt?"extended":""}">${yr} Year${isExt?" — Extended Enrollment":""}</div><div class="quarters-row">`;
    QUARTERS.forEach(qName => {
      const qd = qs.find(q => q.quarter === qName);
      const isNext = yr === startYr && qName === startQ;
      const crClass = qd ? (qd.credits < 12 ? "under" : qd.credits > 18 ? "over" : "ok") : "";
      html += `<div class="quarter-col"><div class="quarter-header">
        <span class="quarter-name">${qName}${isNext?'<span class="current-marker">next</span>':''}</span>
        ${qd ? `<span class="quarter-credits ${crClass}">${qd.credits} cr</span>` : ""}
      </div>`;
      if (qd && qd.courses.length) {
        html += `<div class="course-cards">`;
        qd.courses.forEach(c => {
          const alt = c.primary && isAlt(c, qName);
          const isDelayed = delayed.has(c.id);
          html += `<div class="plan-card ${c.type || "core"}">
            <div class="plan-card-id">${c.id}</div>
            <div class="plan-card-name">${c.title}</div>
            <div class="plan-card-meta">
              <span class="plan-card-cr">${c.cr} cr</span>
              <span>${alt ? '<span class="alt-badge">alt quarter</span>' : ""}${isDelayed ? '<span class="delayed-badge">delayed</span>' : ""}</span>
            </div>
          </div>`;
        });
        html += `</div>`;
      } else { html += `<div class="no-courses">—</div>`; }
      html += `</div>`;
    });
    html += `</div>`;
  });

  html += `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Core ME</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>HSSA</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8B4513"></div>Capstone</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-mid)"></div>Technical elective</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Math/science elective</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>Free elective</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple);opacity:.5"></div>Delayed course</div>
  </div></div>`;

  panel.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  BUILD MODE
// ═══════════════════════════════════════════════════════════

// Returns list of courses not yet placed or completed
function unplacedCourses() {
  const placed = new Set();
  for (let y = 0; y < 6; y++)
    for (let q = 0; q < 3; q++)
      buildGrid[y][q].forEach(s => { if (s.kind === "course") placed.add(s.id); });

  return COURSES.filter(c => {
    if (getState(c.id) >= 1) return false; // done or in-progress
    if (c.id === "EM 306" && controlChoice !== "EM 306") return false;
    if (c.id === "ME 306" && controlChoice !== "ME 306") return false;
    if (placed.has(c.id)) return false;
    return true;
  });
}

function addToCell(yi, qi, courseId) {
  if (!courseId) return;
  if (courseId.startsWith("__elec__")) {
    const etype = courseId.replace("__elec__","");
    buildGrid[yi][qi].push({kind:"elective", electiveType: etype});
  } else {
    // Check not already placed
    for (let y=0;y<6;y++) for (let q=0;q<3;q++)
      if (buildGrid[y][q].some(s=>s.kind==="course"&&s.id===courseId)) return;
    buildGrid[yi][qi].push({kind:"course", id: courseId});
  }
  renderBuild();
}

function removeFromCell(yi, qi, idx) {
  buildGrid[yi][qi].splice(idx, 1);
  renderBuild();
}

function renderBuild(doValidate) {
  const panel = document.getElementById("buildPanel");

  // Simulate prereq satisfaction quarter by quarter (in order)
  // sat at start of each quarter = all completed via courseStates + everything placed before this quarter
  const sat0 = satisfied();

  // Build quarter-order prereq simulation
  // For each quarter, compute what's satisfied entering that quarter
  const quarterSat = [];
  let runSat = new Set(sat0);
  for (let y = 0; y < 6; y++) {
    for (let q = 0; q < 3; q++) {
      quarterSat.push(new Set(runSat));
      // Add courses placed this quarter to runSat for next
      buildGrid[y][q].forEach(s => { if (s.kind==="course") runSat.add(s.id); });
    }
  }

  // Compute elective counts placed
  const ePlaced = {hssa:0, tech:0, ms:0, free:0};
  for (let y=0;y<6;y++)
    for (let q=0;q<3;q++)
      buildGrid[y][q].forEach(s=>{
        if(s.kind==="elective") ePlaced[s.electiveType]++;
      });

  // Requirement status
  const eTotal = {};
  Object.keys(ELEC_REQ).forEach(k => eTotal[k] = electiveDone[k] + ePlaced[k]);

  let html = `<div class="plan-container">`;

  // Summary badges
  html += `<div class="build-summary">`;
  const coreNeeded = COURSES.filter(c=>{
    if(c.id==="EM 306"&&controlChoice!=="EM 306")return false;
    if(c.id==="ME 306"&&controlChoice!=="ME 306")return false;
    return true;
  });
  const corePlaced = coreNeeded.filter(c => {
    if (getState(c.id) >= 1) return true;
    for(let y=0;y<6;y++) for(let q=0;q<3;q++)
      if(buildGrid[y][q].some(s=>s.kind==="course"&&s.id===c.id)) return true;
    return false;
  });
  const coreStatus = corePlaced.length === coreNeeded.length ? "met" : "unmet";
  html += `<span class="req-badge ${coreStatus}">Core: ${corePlaced.length}/${coreNeeded.length}</span>`;
  Object.entries(ELEC_REQ).forEach(([k,req])=>{
    const have = eTotal[k];
    const cls = have>=req?"met":have>0?"partial":"unmet";
    html += `<span class="req-badge ${cls}">${ELEC_META[k].label.split(" ")[0]}: ${have}/${req}</span>`;
  });
  html += `</div>`;

  // Render each year
  for (let y = 0; y < 6; y++) {
    const yearHasContent = buildGrid[y].some(q=>q.length>0);
    if (y >= 4 && !yearHasContent) continue; // hide empty extended years unless needed

    const isExt = y >= 4;
    html += `<div class="plan-year-header ${isExt?"extended":""}">${YEAR_NAMES[y]} Year${isExt?" — Extended Enrollment":""}</div>`;
    html += `<div class="quarters-row">`;

    for (let q = 0; q < 3; q++) {
      const slots = buildGrid[y][q];
      const qSat = quarterSat[y*3+q];
      const qIdx = y*3+q;

      // Compute quarter credit total
      let qCr = 0;
      slots.forEach(s=>{
        if(s.kind==="course"){const c=courseById(s.id);if(c)qCr+=c.cr;}
        else qCr+=4;
      });
      const crClass = qCr===0?"":qCr<12?"build-cr-under":qCr>18?"build-cr-over":"build-cr-ok";

      html += `<div class="build-quarter">`;
      html += `<div class="quarter-header">
        <span class="quarter-name">${QUARTERS[q]}</span>
        ${qCr>0?`<span class="quarter-credits ${crClass}">${qCr} cr</span>`:""}
      </div>`;

      html += `<div class="course-cards">`;
      slots.forEach((s, idx) => {
        let cardClass = "build-card";
        let errHtml = "";

        if (s.kind === "course") {
          const c = courseById(s.id);
          if (!c) return;
          const prereqOk = prereqsMet(c, qSat);
          const availOk  = availInQ(c, QUARTERS[q]);
          if (!prereqOk && !availOk) cardClass += " err-both";
          else if (!prereqOk) cardClass += " err-prereq";
          else if (!availOk)  cardClass += " err-avail";

          if (!prereqOk) {
            const missing = c.prereqs
              .filter(grp => !grp.some(id => qSat.has(id)))
              .map(grp => grp.join(" or "));
            errHtml += `<div class="build-err">Missing prereq: ${missing.join("; ")}</div>`;
          }
          if (!availOk) {
            const offered = (c.primary+(c.alt?"|"+c.alt:"")).split("|").join(", ");
            errHtml += `<div class="build-warn">Not offered in ${QUARTERS[q]} (offered: ${offered})</div>`;
          }

          html += `<div class="${cardClass}">
            <div class="build-card-body">
              <div class="build-card-id">${c.id}</div>
              <div class="build-card-name">${c.title}</div>
              <div class="build-card-cr">${c.cr} cr</div>
              ${errHtml}
            </div>
            <button class="remove-btn" onclick="removeFromCell(${y},${q},${idx})">×</button>
          </div>`;
        } else {
          // Elective slot
          const meta = ELEC_META[s.electiveType];
          html += `<div class="build-card">
            <div class="build-card-body">
              <div class="build-card-id">${s.electiveType.toUpperCase()}</div>
              <div class="build-card-name">${meta.label}</div>
              <div class="build-card-cr">${meta.cr} cr</div>
            </div>
            <button class="remove-btn" onclick="removeFromCell(${y},${q},${idx})">×</button>
          </div>`;
        }
      });
      html += `</div>`;

      // Add-course dropdown
      const avail = unplacedCourses().filter(c => availInQ(c, QUARTERS[q]));
      html += `<select class="add-select" onchange="addToCell(${y},${q},this.value);this.value=''">
        <option value="">+ add course…</option>`;
      if (avail.length) {
        html += `<optgroup label="Courses (available this quarter)">`;
        avail.forEach(c => { html += `<option value="${c.id}">${c.id} — ${c.title} (${c.cr}cr)</option>`; });
        html += `</optgroup>`;
      }
      const notAvail = unplacedCourses().filter(c => !availInQ(c, QUARTERS[q]));
      if (notAvail.length) {
        html += `<optgroup label="Courses (not normally offered — will flag)">`;
        notAvail.forEach(c => { html += `<option value="${c.id}">${c.id} — ${c.title} (${c.cr}cr)</option>`; });
        html += `</optgroup>`;
      }
      // Elective options
      html += `<optgroup label="Elective slots">`;
      Object.entries(ELEC_META).forEach(([k,m]) => {
        const remaining = Math.max(0, ELEC_REQ[k] - eTotal[k]);
        if (remaining > 0)
          html += `<option value="__elec__${k}">${m.label} (${remaining} remaining)</option>`;
      });
      html += `</optgroup></select>`;

      html += `</div>`; // build-quarter
    }
    html += `</div>`; // quarters-row
  }

  html += `<div class="legend">
    <div class="legend-item"><div style="width:9px;height:9px;background:var(--accent-light);border:1px solid #e8b0b0;border-radius:1px;flex-shrink:0"></div>Missing prerequisite</div>
    <div class="legend-item"><div style="width:9px;height:9px;background:var(--amber-light);border:1px solid var(--amber-border);border-radius:1px;flex-shrink:0"></div>Not offered this quarter</div>
    <div class="legend-item"><span class="quarter-credits under" style="font-size:10px;">n cr</span>&nbsp;Under 12 credits</div>
    <div class="legend-item"><span class="quarter-credits over" style="font-size:10px;">n cr</span>&nbsp;Over 18 credits</div>
  </div></div>`;

  panel.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
buildCourseList();
</script>
</body>
</html>
