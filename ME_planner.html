<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME Course Planner — Rose-Hulman</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #d6d0c4;
    --border-strong: #b0a898;
    --text: #1a1814;
    --text-muted: #6b6459;
    --text-faint: #9e9589;
    --accent: #8B1A1A;
    --accent-light: #f5e8e8;
    --accent-mid: #c43030;
    --green: #1a5c2a;
    --green-light: #e8f5ec;
    --green-mid: #2a8c42;
    --blue: #1a3a5c;
    --blue-light: #e8eff7;
    --amber: #7a4a00;
    --amber-light: #fff3d6;
    --amber-border: #e0c060;
    --gray-course: #4a4540;
    --gray-light: #f0ede8;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid #6a1010;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  header span { font-size: 12px; color: rgba(255,255,255,0.7); font-family: var(--mono); }
  header .sep { color: rgba(255,255,255,0.3); margin: 0 4px; }

  .app { display: flex; height: calc(100vh - 49px); overflow: hidden; }

  /* LEFT PANEL */
  .left-panel {
    width: 340px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .panel-header h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }

  .config-row {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .config-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; font-weight: 500; flex-shrink: 0; }
  .config-row select, .config-row input[type=number] {
    flex: 1;
    font-family: var(--font);
    font-size: 13px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
  }
  .config-row select:focus, .config-row input:focus { outline: 2px solid var(--accent); border-color: transparent; }

  /* EM/ME 306 toggle */
  .toggle-group {
    display: flex;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    overflow: hidden;
    flex: 1;
  }
  .toggle-opt {
    flex: 1;
    padding: 5px 4px;
    font-family: var(--font);
    font-size: 11px;
    cursor: pointer;
    border: none;
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.15s;
    line-height: 1.2;
    text-align: center;
  }
  .toggle-opt + .toggle-opt { border-left: 1px solid var(--border-strong); }
  .toggle-opt.active {
    background: var(--accent);
    color: white;
    font-weight: 600;
  }

  /* HSSA counter */
  .counter-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .counter-btn {
    width: 22px; height: 22px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    color: var(--text-muted);
    transition: background 0.1s;
    user-select: none;
    flex-shrink: 0;
  }
  .counter-btn:hover { background: var(--surface2); }
  .counter-btn:disabled { opacity: 0.3; cursor: default; }
  .counter-val {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    min-width: 14px;
    text-align: center;
  }
  .counter-of {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
  }

  /* Course list */
  .course-list { flex: 1; overflow-y: auto; padding: 8px 0; }

  .year-group { margin-bottom: 4px; }
  .year-label {
    padding: 6px 16px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    font-family: var(--mono);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .course-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .course-item:hover { background: var(--surface2); }
  .course-item.s1 { background: var(--amber-light); }
  .course-item.s1:hover { background: #ffedb0; }
  .course-item.s2 { opacity: 0.42; }

  /* 3-state button */
  .state-btn {
    width: 16px; height: 16px;
    border-radius: 2px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all 0.15s;
    user-select: none;
    border: 1.5px solid var(--border-strong);
    background: var(--surface);
    color: transparent;
  }
  .state-btn.s1 {
    border: 1.5px dashed var(--amber);
    background: var(--amber-light);
    color: var(--amber);
    font-weight: 700;
  }
  .state-btn.s2 {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
    font-weight: 700;
  }

  .state-hint {
    font-size: 10px;
    color: var(--text-faint);
    padding: 4px 16px 2px;
    font-style: italic;
  }

  .course-info { flex: 1; min-width: 0; }
  .course-id { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 500; }
  .course-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .course-credits { font-family: var(--mono); font-size: 11px; color: var(--text-faint); flex-shrink: 0; }

  .action-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border-strong);
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-mid); }
  .btn-secondary { background: var(--surface); color: var(--text); }
  .btn-secondary:hover { background: var(--surface2); }

  /* RIGHT PANEL */
  .right-panel {
    flex: 1;
    overflow: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    gap: 12px;
    text-align: center;
  }
  .empty-state .icon { font-size: 40px; opacity: 0.4; }
  .empty-state p { font-size: 14px; max-width: 280px; line-height: 1.6; }

  /* PLAN OUTPUT */
  .plan-container { display: flex; flex-direction: column; gap: 0; }

  .plan-year-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    font-family: var(--mono);
    padding: 20px 0 8px;
    border-bottom: 2px solid var(--border-strong);
    margin-bottom: 0;
  }
  .plan-year-header:first-child { padding-top: 0; }

  .quarters-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .quarter-col {
    padding: 12px 14px;
    border-right: 1px solid var(--border);
    min-height: 120px;
  }
  .quarter-col:last-child { border-right: none; }

  .quarter-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .quarter-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .quarter-credits { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .quarter-credits.over { color: var(--accent); font-weight: 600; }
  .quarter-credits.under { color: var(--amber); font-weight: 600; }

  .course-cards { display: flex; flex-direction: column; gap: 5px; }

  .plan-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    position: relative;
    border-left: 3px solid var(--border-strong);
  }
  .plan-card.core { border-left-color: var(--accent); }
  .plan-card.elective { border-left-color: var(--green-mid); }
  .plan-card.hssa { border-left-color: var(--blue); }
  .plan-card.capstone { border-left-color: #8B4513; }

  .plan-card-id { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .plan-card-name { font-size: 12px; color: var(--text); line-height: 1.3; margin-top: 1px; }
  .plan-card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .plan-card-cr { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .avail-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 2px;
    font-family: var(--mono);
  }
  .avail-badge.alt { background: var(--amber-light); color: var(--amber); }

  .summary-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .summary-stat { font-size: 12px; color: var(--text-muted); }
  .summary-stat strong { color: var(--text); font-weight: 600; }

  .info-box {
    border-radius: var(--radius);
    padding: 9px 14px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .info-box.amber {
    background: var(--amber-light);
    border: 1px solid var(--amber-border);
    color: var(--amber);
  }
  .info-box.red {
    background: var(--accent-light);
    border: 1px solid #e8c0c0;
    color: var(--accent);
  }
  .info-box strong { font-weight: 600; }

  .current-marker {
    display: inline-block;
    font-size: 10px;
    background: var(--accent);
    color: white;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 8px;
    font-family: var(--mono);
    vertical-align: middle;
  }

  .taken-quarter { opacity: 0.5; }
  .taken-quarter .quarter-name::after {
    content: ' — complete';
    font-weight: 400;
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-faint);
  }

  .no-courses { font-size: 11px; color: var(--text-faint); font-style: italic; padding: 4px 0; }

  .legend {
    display: flex;
    gap: 16px;
    padding: 14px 0 4px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>ME Course Planner</h1>
  <span class="sep">|</span>
  <span>Rose-Hulman Institute of Technology</span>
</header>

<div class="app">
  <div class="left-panel">
    <div class="panel-header">
      <h2>Courses Completed</h2>
    </div>

    <div class="config-row">
      <label>Upcoming quarter</label>
      <select id="startQuarter">
        <option value="Fall">Fall</option>
        <option value="Winter">Winter</option>
        <option value="Spring">Spring</option>
      </select>
    </div>
    <div class="config-row">
      <label>Starting year</label>
      <select id="startYear">
        <option value="Freshman">Freshman</option>
        <option value="Sophomore">Sophomore</option>
        <option value="Junior">Junior</option>
        <option value="Senior">Senior</option>
      </select>
    </div>
    <div class="config-row">
      <label>Credits/quarter</label>
      <input type="number" id="targetCredits" value="16" min="12" max="18" style="width:60px;flex:none;">
      <span style="font-size:11px;color:var(--text-faint);">(12–18)</span>
    </div>
    <div class="config-row">
      <label>Control course</label>
      <div class="toggle-group" id="controlToggle">
        <button class="toggle-opt active" data-val="EM 306" onclick="setControl('EM 306')">EM 306<br>Vibrations</button>
        <button class="toggle-opt" data-val="ME 306" onclick="setControl('ME 306')">ME 306<br>Controls</button>
      </div>
    </div>
    <div class="config-row">
      <label>HSSA electives done</label>
      <div class="counter-ctrl">
        <button class="counter-btn" id="hssaMinus" onclick="changeHssa(-1)">−</button>
        <span class="counter-val" id="hssaVal">0</span>
        <button class="counter-btn" id="hssaPlus" onclick="changeHssa(1)">+</button>
        <span class="counter-of">/ 3 needed</span>
      </div>
    </div>

    <div class="state-hint">Click course state: □ none → ◐ in progress → ✓ done</div>
    <div class="course-list" id="courseList"></div>

    <div class="action-bar">
      <button class="btn btn-secondary" onclick="clearAll()">Clear all</button>
      <button class="btn btn-primary" onclick="generatePlan()">Generate plan →</button>
    </div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div class="empty-state">
      <div class="icon">◳</div>
      <p>Select completed courses on the left, set your upcoming quarter, then click <strong>Generate plan</strong>.</p>
    </div>
  </div>
</div>

<script>
// prereqs: array of OR-groups. All groups must be satisfied (AND of ORs).
// [[A, B], [C]] means (A OR B) AND C
// [[A]] means just A required
const COURSES = [
  // Freshman
  { id:"RHIT 100",   title:"RH Success",                        credits:1, year:"Freshman",  primary:"Fall",           alt:"",           prereqs:[], type:"core" },
  { id:"MA 111",     title:"Calculus I",                        credits:5, year:"Freshman",  primary:"Fall",           alt:"",           prereqs:[], type:"core" },
  { id:"PH 111",     title:"Foundations of Science I",          credits:4, year:"Freshman",  primary:"Fall",           alt:"",           prereqs:[], type:"core" },
  { id:"EM 104",     title:"Graphical Communications",          credits:2, year:"Freshman",  primary:"Fall",           alt:"",           prereqs:[], type:"core" },
  { id:"HUM H190",   title:"First-Year Writing Seminar",        credits:4, year:"Freshman",  primary:"Fall|Winter|Spring", alt:"",       prereqs:[], type:"hssa" },
  { id:"MA 112",     title:"Calculus II",                       credits:5, year:"Freshman",  primary:"Winter",         alt:"",           prereqs:[["MA 111"]], type:"core" },
  { id:"PH 112",     title:"Foundations of Science II",         credits:4, year:"Freshman",  primary:"Winter",         alt:"",           prereqs:[["PH 111"],["MA 111"]], type:"core" },
  { id:"EM 103",     title:"Introduction to Design",            credits:2, year:"Freshman",  primary:"Spring",         alt:"",           prereqs:[], type:"core" },
  { id:"MA 113",     title:"Calculus III",                      credits:5, year:"Freshman",  primary:"Spring",         alt:"",           prereqs:[["MA 112"]], type:"core" },
  { id:"ME 123",     title:"Computer Programming",              credits:4, year:"Freshman",  primary:"Spring",         alt:"Fall|Winter", prereqs:[], type:"core" },

  // Sophomore
  { id:"EM 121",     title:"Statics & Mechanics of Materials I",credits:4, year:"Sophomore", primary:"Winter",         alt:"Fall|Spring", prereqs:[["MA 111"]], type:"core" },
  { id:"CHEM 111",   title:"Foundations of Science III",        credits:4, year:"Sophomore", primary:"Fall",           alt:"",           prereqs:[], type:"core" },
  { id:"MA 221",     title:"Matrix Algebra & Diff Eqns I",      credits:4, year:"Sophomore", primary:"Fall",           alt:"",           prereqs:[["MA 113"]], type:"core" },
  { id:"EM 204",     title:"Statics & Mechanics of Materials II",credits:4,year:"Sophomore", primary:"Fall",           alt:"Winter|Spring",prereqs:[["EM 121"]], type:"core" },
  { id:"ES 201",     title:"Conservation & Accounting Principles",credits:4,year:"Sophomore",primary:"Fall",           alt:"Winter",     prereqs:[["PH 111"],["EM 121"],["MA 113"]], type:"core" },
  { id:"ES 213",     title:"Electrical Systems",                credits:4, year:"Sophomore", primary:"Fall",           alt:"Winter|Spring",prereqs:[["PH 112"],["MA 113"],["EM 121"]], type:"core" },
  { id:"MA 222",     title:"Matrix Algebra & Diff Eqns II",     credits:4, year:"Sophomore", primary:"Winter",         alt:"",           prereqs:[["MA 221"]], type:"core" },
  { id:"ES 214",     title:"Mechanical Systems",                credits:4, year:"Sophomore", primary:"Winter",         alt:"Spring",     prereqs:[["ME 123"],["MA 221"],["ES 201"]], type:"core" },
  { id:"ME 201",     title:"Applications of Thermodynamics",    credits:4, year:"Sophomore", primary:"Winter",         alt:"Spring",     prereqs:[["ES 201"]], type:"core" },
  { id:"MA 223",     title:"Engineering Statistics I",          credits:4, year:"Sophomore", primary:"Spring",         alt:"",           prereqs:[["MA 221"]], type:"core" },
  { id:"ME 227",     title:"Numerical Methods",                 credits:4, year:"Sophomore", primary:"Spring",         alt:"Fall",       prereqs:[["ME 123"],["MA 222"]], type:"core" },

  // Junior
  { id:"ES 305",     title:"System Dynamics",                   credits:4, year:"Junior",    primary:"Fall",           alt:"Winter",     prereqs:[["MA 222"],["ES 213"],["ES 214"]], type:"core" },
  { id:"ES 312",     title:"Fluid Systems",                     credits:4, year:"Junior",    primary:"Fall",           alt:"Winter",     prereqs:[["ES 201"]], type:"core" },
  { id:"ME 317",     title:"Design for Manufacturing",          credits:4, year:"Junior",    primary:"Winter",         alt:"Fall",       prereqs:[["EM 104"]], type:"core" },
  { id:"EM 306",     title:"Vibration Analysis",                credits:4, year:"Junior",    primary:"Winter",         alt:"Spring",     prereqs:[["ES 305"]], type:"core" },
  { id:"ME 306",     title:"Control Systems",                   credits:4, year:"Junior",    primary:"Winter",         alt:"Spring",     prereqs:[["ES 305"]], type:"core" },
  { id:"ME 321",     title:"Measurement Systems",               credits:4, year:"Junior",    primary:"Winter",         alt:"Fall|Spring", prereqs:[["EM 103"],["MA 223"],["ES 305"]], type:"core" },
  { id:"ME 328",     title:"Materials Engineering",             credits:4, year:"Junior",    primary:"Winter",         alt:"Spring",     prereqs:[["CHEM 111"]], type:"core" },
  { id:"ENGL H290",  title:"Tech and Prof Communication",       credits:4, year:"Junior",    primary:"Winter",         alt:"Spring",     prereqs:[["HUM H190"]], type:"hssa" },
  { id:"ME 230",     title:"Mechatronic Systems",               credits:4, year:"Junior",    primary:"Spring",         alt:"Fall",       prereqs:[["ME 123"],["ES 213"]], type:"core" },
  { id:"ME 302",     title:"Heat Transfer",                     credits:4, year:"Junior",    primary:"Spring",         alt:"Fall",       prereqs:[["MA 221"],["ES 312"]], type:"core" },
  { id:"ME 380",     title:"Machine Component Design",          credits:4, year:"Junior",    primary:"Spring",         alt:"Fall",       prereqs:[["EM 204"]], type:"core" },

  // Senior
  { id:"ME 421",     title:"ME Lab",                            credits:4, year:"Senior",    primary:"Fall",           alt:"Winter",     prereqs:[["ME 321"],["ENGL H290"]], type:"core" },
  { id:"ME 470",     title:"Capstone Design I",                 credits:4, year:"Senior",    primary:"Fall",           alt:"Spring",     prereqs:[["ME 230"],["ME 302"],["ME 321"],["ME 380"]], type:"capstone" },
  { id:"ME 471",     title:"Capstone Design II",                credits:4, year:"Senior",    primary:"Winter",         alt:"Fall",       prereqs:[["ME 470"]], type:"capstone" },
  { id:"ME 472",     title:"Capstone Design III",               credits:4, year:"Senior",    primary:"Spring",         alt:"Winter",     prereqs:[["ME 471"]], type:"capstone" },

  // Elective placeholders
  { id:"Free Elective", title:"Free Elective",                  credits:4, year:"Senior",    primary:"Fall|Winter|Spring", alt:"",       prereqs:[], type:"elective" },
];

const QUARTERS = ["Fall","Winter","Spring"];
const YEARS    = ["Freshman","Sophomore","Junior","Senior"];
const HSSA_TOTAL = 3; // generic HSSA electives needed (beyond H190 and H290)

// courseStates: id -> 0 (not taken), 1 (in progress), 2 (completed)
let courseStates  = {};
let hssaCompleted = 0;
let controlChoice = 'EM 306';

// ── State helpers ─────────────────────────────────────────────────────────────

function getState(id) { return courseStates[id] || 0; }

function cycleState(id) {
  courseStates[id] = (getState(id) + 1) % 3;
  if (courseStates[id] === 0) delete courseStates[id];
  buildCourseList();
}

// Both in-progress (1) and completed (2) satisfy prerequisites
function getSatisfied() {
  return new Set(COURSES.filter(c => getState(c.id) >= 1).map(c => c.id));
}

function setControl(val) {
  controlChoice = val;
  document.querySelectorAll('.toggle-opt').forEach(b => b.classList.toggle('active', b.dataset.val === val));
  buildCourseList();
}

function changeHssa(delta) {
  hssaCompleted = Math.max(0, Math.min(HSSA_TOTAL, hssaCompleted + delta));
  document.getElementById('hssaVal').textContent = hssaCompleted;
  document.getElementById('hssaMinus').disabled = hssaCompleted === 0;
  document.getElementById('hssaPlus').disabled  = hssaCompleted === HSSA_TOTAL;
}

// ── Prereq / availability helpers ────────────────────────────────────────────

// Every OR-group must have at least one member in satisfiedSet
function prereqsMet(course, satisfiedSet) {
  if (!course.prereqs || course.prereqs.length === 0) return true;
  return course.prereqs.every(orGroup => orGroup.some(id => satisfiedSet.has(id)));
}

function courseAvailableInQuarter(course, quarter) {
  return course.primary.split('|').includes(quarter) ||
         (course.alt && course.alt.split('|').includes(quarter));
}

function isAltQuarter(course, quarter) {
  return !course.primary.split('|').includes(quarter) &&
         !!course.alt && course.alt.split('|').includes(quarter);
}

// ── Build left-panel list ─────────────────────────────────────────────────────

function buildCourseList() {
  const list = document.getElementById('courseList');
  list.innerHTML = '';

  YEARS.forEach(yr => {
    const courses = COURSES.filter(c => {
      if (c.year !== yr) return false;
      if (c.id === 'EM 306' && controlChoice !== 'EM 306') return false;
      if (c.id === 'ME 306' && controlChoice !== 'ME 306') return false;
      return true;
    });
    if (!courses.length) return;

    const group = document.createElement('div');
    group.className = 'year-group';

    const label = document.createElement('div');
    label.className = 'year-label';
    label.textContent = yr;
    group.appendChild(label);

    courses.forEach(c => {
      const st = getState(c.id);
      const item = document.createElement('div');
      item.className = `course-item s${st}`;

      const btnClass   = st === 0 ? '' : `s${st}`;
      const btnContent = st === 0 ? '' : st === 1 ? '–' : '✓';
      const safeId     = c.id.replace(/'/g, "\\'");

      item.innerHTML = `
        <div class="state-btn ${btnClass}" onclick="cycleState('${safeId}')" title="${st===0?'Not taken':st===1?'In progress':'Completed'}">${btnContent}</div>
        <div class="course-info">
          <div class="course-id">${c.id}</div>
          <div class="course-name">${c.title}</div>
        </div>
        <div class="course-credits">${c.credits}cr</div>
      `;
      group.appendChild(item);
    });

    list.appendChild(group);
  });

  // Sync counter button disabled states
  document.getElementById('hssaMinus').disabled = hssaCompleted === 0;
  document.getElementById('hssaPlus').disabled  = hssaCompleted === HSSA_TOTAL;
}

// ── Clear all ─────────────────────────────────────────────────────────────────

function clearAll() {
  courseStates  = {};
  hssaCompleted = 0;
  document.getElementById('hssaVal').textContent = 0;
  buildCourseList();
  document.getElementById('rightPanel').innerHTML = `
    <div class="empty-state">
      <div class="icon">◳</div>
      <p>Select completed courses on the left, set your upcoming quarter, then click <strong>Generate plan</strong>.</p>
    </div>`;
}

// ── Generate plan ─────────────────────────────────────────────────────────────

function generatePlan() {
  const startQ   = document.getElementById('startQuarter').value;
  const startYr  = document.getElementById('startYear').value;
  const targetCr = Math.max(12, Math.min(18, parseInt(document.getElementById('targetCredits').value) || 16));

  // Build quarter sequence from start → Senior/Spring
  const allQuarters = [];
  const startYrIdx  = YEARS.indexOf(startYr);
  const startQIdx   = QUARTERS.indexOf(startQ);
  for (let yi = startYrIdx; yi < YEARS.length; yi++) {
    for (let qi = (yi === startYrIdx ? startQIdx : 0); qi < QUARTERS.length; qi++) {
      allQuarters.push({ year: YEARS[yi], quarter: QUARTERS[qi] });
    }
  }

  // Courses still needing scheduling: state === 0, not in-progress or done
  // Exclude the unchosen control course
  let needed = COURSES.filter(c => {
    if (getState(c.id) !== 0) return false;
    if (c.id === 'EM 306' && controlChoice !== 'EM 306') return false;
    if (c.id === 'ME 306' && controlChoice !== 'ME 306') return false;
    if (c.id === 'Free Elective') return false; // handled below
    return true;
  });

  const hssaToSchedule = Math.max(0, HSSA_TOTAL - hssaCompleted);
  const freeToSchedule = getState('Free Elective') >= 1 ? 0 : 1;

  // Prereq-satisfaction seed: all in-progress + completed courses
  let satisfied    = getSatisfied();
  let remaining    = [...needed];
  let hssaDone     = 0;
  let freeDone     = 0;
  const schedule   = [];

  for (const { year, quarter } of allQuarters) {
    const qCourses = [];
    let qCredits   = 0;

    // Eligible = available this quarter AND all prereqs met
    const eligible = remaining.filter(c =>
      courseAvailableInQuarter(c, quarter) && prereqsMet(c, satisfied)
    );

    // Priority: earlier-year courses first; capstones last; primary quarter > alt quarter
    eligible.sort((a, b) => {
      const yA = YEARS.indexOf(a.year) === -1 ? 99 : YEARS.indexOf(a.year);
      const yB = YEARS.indexOf(b.year) === -1 ? 99 : YEARS.indexOf(b.year);
      if (yA !== yB) return yA - yB;
      const capA = a.type === 'capstone' ? 1 : 0;
      const capB = b.type === 'capstone' ? 1 : 0;
      if (capA !== capB) return capA - capB;
      return (isAltQuarter(a, quarter) ? 1 : 0) - (isAltQuarter(b, quarter) ? 1 : 0);
    });

    for (const c of eligible) {
      if (qCredits + c.credits > 18) continue;
      qCourses.push(c);
      qCredits += c.credits;
      satisfied = new Set([...satisfied, c.id]);
      remaining = remaining.filter(x => x.id !== c.id);
      if (qCredits >= targetCr) break;
    }

    // Fill HSSA elective slots
    while (hssaDone < hssaToSchedule && qCredits + 4 <= 18) {
      qCourses.push({ id:'HSSA Elective', title:'HSSA Elective', credits:4, type:'hssa', primary:'Fall|Winter|Spring', alt:'' });
      qCredits += 4;
      hssaDone++;
      if (qCredits >= targetCr) break;
    }

    // Fill free elective slot
    if (freeDone < freeToSchedule && qCredits + 4 <= 18) {
      qCourses.push({ id:'Free Elective', title:'Free Elective', credits:4, type:'elective', primary:'Fall|Winter|Spring', alt:'' });
      qCredits += 4;
      freeDone++;
    }

    if (qCourses.length > 0) {
      schedule.push({ year, quarter, courses: qCourses, credits: qCredits });
    }

    if (remaining.length === 0 && hssaDone >= hssaToSchedule && freeDone >= freeToSchedule) break;
  }

  renderPlan(schedule, startQ, startYr, targetCr);
}

// ── Render plan ───────────────────────────────────────────────────────────────

function renderPlan(schedule, startQ, startYr, targetCr) {
  const panel = document.getElementById('rightPanel');

  const byYear    = {};
  schedule.forEach(q => { (byYear[q.year] = byYear[q.year] || []).push(q); });

  const totalRemaining = schedule.reduce((s, q) => s + q.credits, 0);
  const totalCompleted = COURSES.reduce((s, c) => {
    const st = getState(c.id);
    return st === 2 ? s + c.credits : s;
  }, 0) + hssaCompleted * 4;
  const inProgressList = COURSES.filter(c => getState(c.id) === 1);

  let html = `<div class="plan-container">`;

  html += `<div class="summary-bar">
    <span class="summary-stat"><strong>${schedule.length}</strong> quarters planned</span>
    <span class="summary-stat"><strong>${totalRemaining}</strong> cr remaining</span>
    <span class="summary-stat"><strong>${totalCompleted}</strong> cr completed</span>
    <span class="summary-stat">Target <strong>${targetCr}</strong> cr/qtr</span>
    <span class="summary-stat">Control: <strong>${controlChoice}</strong></span>
  </div>`;

  if (inProgressList.length > 0) {
    const ids = inProgressList.map(c => c.id).join(', ');
    html += `<div class="info-box amber"><strong>In progress:</strong> ${ids} — counted as complete for prerequisite purposes.</div>`;
  }

  const warnings = schedule.filter(q => q.credits < 12 || q.credits > 18);
  if (warnings.length) {
    html += `<div class="info-box red"><strong>Note:</strong> Some quarters fall outside the 12–18 credit window due to prerequisite constraints.</div>`;
  }

  YEARS.forEach(yr => {
    const qs = byYear[yr];
    if (!qs || qs.length === 0) return;

    html += `<div class="plan-year-header">${yr} Year</div><div class="quarters-row">`;

    QUARTERS.forEach(qName => {
      const qData  = qs.find(q => q.quarter === qName);
      const isNext = yr === startYr && qName === startQ;
      const isPast = !qData;

      html += `<div class="quarter-col ${isPast ? 'taken-quarter' : ''}">`;
      html += `<div class="quarter-header">
        <span class="quarter-name">${qName}${isNext ? '<span class="current-marker">next</span>' : ''}</span>
        ${qData ? `<span class="quarter-credits ${qData.credits < 12 ? 'under' : qData.credits > 18 ? 'over' : ''}">${qData.credits} cr</span>` : ''}
      </div>`;

      if (qData && qData.courses.length > 0) {
        html += `<div class="course-cards">`;
        qData.courses.forEach(c => {
          const alt = c.primary && isAltQuarter(c, qName);
          html += `<div class="plan-card ${c.type || 'core'}">
            <div class="plan-card-id">${c.id}</div>
            <div class="plan-card-name">${c.title}</div>
            <div class="plan-card-meta">
              <span class="plan-card-cr">${c.credits} cr</span>
              ${alt ? `<span class="avail-badge alt">alt quarter</span>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
      } else if (!isPast) {
        html += `<div class="no-courses">No courses scheduled</div>`;
      }

      html += `</div>`;
    });

    html += `</div>`;
  });

  html += `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Core ME</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> HSSA</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8B4513"></div> Capstone</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-mid)"></div> Elective</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div> Alt quarter</div>
  </div></div>`;

  panel.innerHTML = html;
}

buildCourseList();
</script>
