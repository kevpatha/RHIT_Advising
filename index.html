<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME Course Planner — Rose-Hulman</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ee; --surface:#fff; --surface2:#f0ede6; --border:#d6d0c4; --border-strong:#b0a898;
  --text:#1a1814; --text-muted:#6b6459; --text-faint:#9e9589;
  --accent:#8B1A1A; --accent-light:#f5e8e8; --accent-mid:#c43030;
  --green:#1a5c2a; --green-mid:#2a8c42; --blue:#1a3a5c;
  --amber:#7a4a00; --amber-light:#fff8e8; --amber-border:#e0c060;
  --purple:#5a1a7a; --purple-light:#f3e8fa;
  --teal:#0a5c4a; --teal-light:#e0f5f0;
  --summer:#1a4a5c; --summer-light:#e0f0f8;
  --font:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace; --radius:4px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}

header{background:var(--accent);color:white;padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;border-bottom:2px solid #6a1010;flex-wrap:wrap;}
header h1{font-size:14px;font-weight:600;letter-spacing:.02em;white-space:nowrap;}
header .sep{color:rgba(255,255,255,.3);}
header .sub{font-size:11px;color:rgba(255,255,255,.65);font-family:var(--mono);white-space:nowrap;}
.plan-tabs{display:flex;gap:2px;flex-wrap:wrap;}
.plan-tab{padding:4px 10px;border-radius:var(--radius);font-size:10px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);background:transparent;transition:all .15s;font-family:var(--font);white-space:nowrap;}
.plan-tab.active{background:white;color:var(--accent);border-color:white;}
.plan-tab:hover:not(.active){background:rgba(255,255,255,.15);color:white;}
.mode-tabs{margin-left:auto;display:flex;gap:2px;}
.mode-tab{padding:4px 11px;border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.75);background:transparent;transition:all .15s;font-family:var(--font);}
.mode-tab.active{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.6);color:white;}
.mode-tab:hover:not(.active){background:rgba(255,255,255,.12);}

.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;}
.loading-screen p{font-size:13px;color:var(--text-muted);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.app{display:flex;height:calc(100vh - 47px);overflow:hidden;}

/* LEFT */
.left-panel{width:306px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.panel-header{padding:8px 13px 6px;border-bottom:1px solid var(--border);background:var(--surface2);}
.panel-header h2{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-muted);}
.config-row{padding:5px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.config-row label{font-size:11px;color:var(--text-muted);white-space:nowrap;font-weight:500;min-width:90px;}
.config-row select,.config-row input[type=number]{font-family:var(--font);font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);flex:1;}
.config-row select:focus,.config-row input:focus{outline:2px solid var(--accent);border-color:transparent;}
.toggle-group{display:flex;border:1px solid var(--border-strong);border-radius:var(--radius);overflow:hidden;flex:1;}
.toggle-opt{flex:1;padding:3px 3px;font-family:var(--font);font-size:10px;cursor:pointer;border:none;background:var(--surface);color:var(--text-muted);transition:all .15s;line-height:1.2;text-align:center;}
.toggle-opt+.toggle-opt{border-left:1px solid var(--border-strong);}
.toggle-opt.active{background:var(--accent);color:white;font-weight:600;}
.counter-ctrl{display:flex;align-items:center;gap:4px;flex:1;}
.counter-btn{width:18px;height:18px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--text-muted);user-select:none;flex-shrink:0;}
.counter-btn:hover{background:var(--surface2);}
.counter-btn:disabled{opacity:.3;cursor:default;}
.counter-val{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);min-width:14px;text-align:center;}
.counter-of{font-size:10px;color:var(--text-faint);font-family:var(--mono);}
.course-list{flex:1;overflow-y:auto;padding:3px 0;}
.year-group{margin-bottom:1px;}
.year-label{padding:4px 13px 2px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);font-family:var(--mono);position:sticky;top:0;background:var(--surface);z-index:1;border-bottom:1px solid var(--border);}
.course-item{display:flex;align-items:center;gap:7px;padding:3px 13px;cursor:pointer;}
.course-item:hover{background:var(--surface2);}
.course-item.s1{background:var(--amber-light);}
.course-item.s2{opacity:.4;}
.state-btn{width:14px;height:14px;border-radius:2px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;user-select:none;border:1.5px solid var(--border-strong);background:var(--surface);color:transparent;}
.state-btn.s1{border:1.5px dashed var(--amber);background:var(--amber-light);color:var(--amber);font-weight:700;}
.state-btn.s2{border-color:var(--accent);background:var(--accent);color:white;font-weight:700;}
.state-hint{font-size:9px;color:var(--text-faint);padding:3px 13px;font-style:italic;border-bottom:1px solid var(--border);}
.course-info{flex:1;min-width:0;}
.course-id{font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:500;}
.course-name{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.course-credits{font-family:var(--mono);font-size:10px;color:var(--text-faint);flex-shrink:0;}
.action-bar{padding:8px 13px;border-top:1px solid var(--border);display:flex;gap:5px;}
.btn{flex:1;padding:6px 8px;border-radius:var(--radius);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border-strong);transition:all .15s;}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-mid);}
.btn-secondary{background:var(--surface);color:var(--text);}
.btn-secondary:hover{background:var(--surface2);}
.btn-sm{flex:none;padding:5px 8px;font-size:10px;}

/* RIGHT */
.right-panel,.build-panel{flex:1;overflow:auto;padding:14px 18px;display:flex;flex-direction:column;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-faint);gap:10px;text-align:center;padding:40px;}
.empty-state .icon{font-size:34px;opacity:.35;}
.empty-state p{font-size:13px;max-width:300px;line-height:1.6;}

/* PLAN GRID */
.plan-container{display:flex;flex-direction:column;}
.plan-year-header{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);font-family:var(--mono);padding:14px 0 5px;border-bottom:2px solid var(--border-strong);}
.plan-year-header:first-child{padding-top:0;}
.plan-year-header.extended{color:var(--amber);}
.quarters-row{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
.quarters-row.with-summer{grid-template-columns:repeat(4,1fr);}
.quarter-col{padding:9px 11px;border-right:1px solid var(--border);min-height:80px;}
.quarter-col:last-child{border-right:none;}
.quarter-col.summer-col{background:var(--summer-light);}
.quarter-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
.quarter-name{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);}
.quarter-name.summer-name{color:var(--summer);}
.quarter-credits{font-family:var(--mono);font-size:9px;}
.quarter-credits.over{color:var(--accent);font-weight:600;}
.quarter-credits.under{color:var(--amber);font-weight:600;}
.quarter-credits.ok{color:var(--green-mid);}
.course-cards{display:flex;flex-direction:column;gap:3px;}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 7px;border-left:3px solid var(--border-strong);}
.plan-card.core{border-left-color:var(--accent);}
.plan-card.hssa{border-left-color:var(--blue);}
.plan-card.capstone{border-left-color:#8B4513;}
.plan-card.elective-hssa{border-left-color:var(--blue);}
.plan-card.elective-tech{border-left-color:var(--green-mid);}
.plan-card.elective-ms{border-left-color:var(--purple);}
.plan-card.elective-free{border-left-color:var(--teal);}
.plan-card.summer-card{border-left-color:var(--summer);}
.plan-card-id{font-family:var(--mono);font-size:9px;color:var(--text-faint);}
.plan-card-name{font-size:10px;color:var(--text);line-height:1.3;margin-top:1px;}
.plan-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.plan-card-cr{font-family:var(--mono);font-size:9px;color:var(--text-faint);}
.alt-badge{font-size:8px;padding:1px 3px;border-radius:2px;background:var(--amber-light);color:var(--amber);font-family:var(--mono);border:1px solid var(--amber-border);}
.delayed-badge{font-size:8px;padding:1px 3px;border-radius:2px;background:var(--purple-light);color:var(--purple);font-family:var(--mono);border:1px solid #c8a0e8;}
.no-courses{font-size:10px;color:var(--text-faint);font-style:italic;}
.current-marker{font-size:8px;background:var(--accent);color:white;padding:1px 4px;border-radius:2px;margin-left:5px;font-family:var(--mono);vertical-align:middle;}
.summary-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 11px;margin-bottom:9px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.summary-stat{font-size:11px;color:var(--text-muted);}
.summary-stat strong{color:var(--text);font-weight:600;}
.info-box{border-radius:var(--radius);padding:6px 11px;margin-bottom:7px;font-size:11px;}
.info-box.amber{background:var(--amber-light);border:1px solid var(--amber-border);color:var(--amber);}
.info-box.red{background:var(--accent-light);border:1px solid #e8c0c0;color:var(--accent);}
.info-box.purple{background:var(--purple-light);border:1px solid #c8a0e8;color:var(--purple);}
.info-box.blue{background:#e8eff7;border:1px solid #a0b8d8;color:var(--blue);}
.info-box strong{font-weight:600;}
.legend{display:flex;gap:10px;padding:10px 0 3px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);}
.legend-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0;}

/* PRE-RHIT */
.pre-rhit-section{margin-top:12px;}
.pre-rhit-header{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);font-family:var(--mono);padding:8px 0 4px;border-bottom:2px solid #a0b8d8;margin-bottom:6px;}
.pre-rhit-cards{display:flex;flex-wrap:wrap;gap:4px;}

/* BUILD MODE */
.build-quarter{padding:9px 11px;border-right:1px solid var(--border);min-height:110px;display:flex;flex-direction:column;gap:4px;}
.build-quarter:last-child{border-right:none;}
.build-quarter.summer-col{background:var(--summer-light);}
.build-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px 6px;display:flex;align-items:flex-start;gap:3px;}
.build-card.err-prereq{background:var(--accent-light);border-color:#e8b0b0;}
.build-card.err-avail{background:var(--amber-light);border-color:var(--amber-border);}
.build-card.err-both{background:#fdf0f0;border-color:#e8b0b0;}
.build-card-body{flex:1;min-width:0;}
.build-card-id{font-family:var(--mono);font-size:9px;color:var(--text-faint);}
.build-card-name{font-size:10px;color:var(--text);line-height:1.2;}
.build-card-cr{font-family:var(--mono);font-size:9px;color:var(--text-faint);margin-top:1px;}
.build-err{font-size:9px;color:var(--accent);margin-top:2px;line-height:1.3;}
.build-warn{font-size:9px;color:var(--amber);margin-top:2px;line-height:1.3;}
.remove-btn{width:13px;height:13px;border:none;background:none;cursor:pointer;color:var(--text-faint);font-size:12px;line-height:1;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:2px;}
.remove-btn:hover{background:var(--accent-light);color:var(--accent);}
.add-select{width:100%;font-family:var(--font);font-size:10px;padding:3px 4px;border:1px dashed var(--border-strong);border-radius:var(--radius);background:var(--surface2);color:var(--text-muted);cursor:pointer;margin-top:2px;}
.add-select:focus{outline:2px solid var(--accent);}
.build-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 11px;margin-bottom:9px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.req-badge{font-size:10px;padding:2px 6px;border-radius:10px;font-family:var(--mono);font-weight:500;}
.req-badge.met{background:var(--teal-light);color:var(--teal);}
.req-badge.unmet{background:var(--accent-light);color:var(--accent);}
.req-badge.partial{background:var(--amber-light);color:var(--amber);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p>Loading curriculum data…</p>
</div>

<header id="appHeader" style="display:none;">
  <h1>ME Course Planner</h1>
  <span class="sep">|</span>
  <span class="sub">Rose-Hulman</span>
  <div class="plan-tabs" id="planTabs"></div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-suggest" onclick="switchMode('suggest')">Suggest</button>
    <button class="mode-tab"        id="tab-build"   onclick="switchMode('build')">Build</button>
  </div>
</header>

<div class="app" id="appBody" style="display:none;">
  <div class="left-panel">
    <div class="panel-header"><h2>Courses &amp; Settings</h2></div>
    <div class="config-row">
      <label>Upcoming quarter</label>
      <select id="startQuarter">
        <option>Fall</option><option>Winter</option><option>Spring</option><option>Summer</option>
      </select>
    </div>
    <div class="config-row">
      <label>Year standing</label>
      <select id="startYear" id="startYear"></select>
    </div>
    <div class="config-row" id="targetRow">
      <label>Target cr/qtr</label>
      <input type="number" id="targetCredits" value="16" min="12" max="18" style="width:46px;flex:none;">
      <span style="font-size:10px;color:var(--text-faint);">(12–18)</span>
    </div>
    <div class="config-row">
      <label>Control course</label>
      <div class="toggle-group">
        <button class="toggle-opt active" data-val="EM 306" onclick="setControl('EM 306')">EM 306<br>Vibrations</button>
        <button class="toggle-opt"        data-val="ME 306" onclick="setControl('ME 306')">ME 306<br>Controls</button>
      </div>
    </div>
    <div class="config-row">
      <label>Show summer</label>
      <div class="toggle-group">
        <button class="toggle-opt active" data-val="no"  onclick="setSummer('no')">Hide</button>
        <button class="toggle-opt"        data-val="yes" onclick="setSummer('yes')">Show</button>
      </div>
    </div>

    <!-- Elective counters — populated dynamically per plan -->
    <div id="electiveCounters"></div>

    <div class="state-hint">Click course: □ none → ◐ in progress → ✓ done</div>
    <div class="course-list" id="courseList"></div>
    <div class="action-bar">
      <button class="btn btn-secondary btn-sm" onclick="clearAll()">Clear</button>
      <button class="btn btn-primary" id="mainBtn" onclick="handleMain()">Generate plan →</button>
    </div>
  </div>

  <div class="right-panel" id="suggestPanel">
    <div class="empty-state">
      <div class="icon">◳</div>
      <p>Mark completed courses, configure your settings, then click <strong>Generate plan</strong>.</p>
    </div>
  </div>
  <div class="build-panel" id="buildPanel" style="display:none;"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CSV PARSER
// ═══════════════════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n');
  const rows = [];
  for (const line of lines) {
    if (!line.trim()) { rows.push([]); continue; }
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"' && !inQ) { inQ = true; }
      else if (c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"' && inQ) { inQ = false; }
      else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function rowsToObjects(rows) {
  const headers = rows[0];
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = (r[i]||'').trim());
    return obj;
  });
}

// ═══════════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════════
let COURSES = [];      // from ME_curriculum.csv
let PLANS = {};        // planId -> {meta, schedule, electiveReqs, preRhit}
let activePlanId = 'standard';

const PLAN_FILES = [
  { id:'standard',    name:'Standard',       file:'plan_standard.csv' },
  { id:'calculus_abc',name:'Calculus ABC',   file:'plan_calculus_abc.csv' },
  { id:'rose2_mme',   name:'Rose² MME',      file:'plan_rose2_mme.csv' },
  { id:'rose2_mem',   name:'Rose² MEM',      file:'plan_rose2_mem.csv' },
];

async function fetchText(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error('Could not load ' + path);
  return r.text();
}

function parseCurriculumCSV(text) {
  const rows = parseCSV(text);
  const headers = rows[0];
  return rows.slice(1).filter(r => r[0]).map(r => {
    const o = {};
    headers.forEach((h,i) => o[h.trim()] = (r[i]||'').trim());
    // Convert prereq string to OR-group array
    // Format: "A; B; (C or D)" → [["A"],["B"],["C","D"]]
    const prereqStr = o.prerequisites || '';
    if (!prereqStr) { o.prereqGroups = []; }
    else {
      o.prereqGroups = prereqStr.split(';').map(part => {
        part = part.trim().replace(/[()]/g,'');
        return part.split(/\s+or\s+/i).map(s=>s.trim()).filter(Boolean);
      }).filter(g=>g.length);
    }
    // Available quarters: merge primary + alternate
    const primary = (o.primary_quarter||'').split(/[;|]/).map(s=>s.trim()).filter(Boolean);
    const alt     = (o.alternate_quarters||'').split(/[;|]/).map(s=>s.trim()).filter(Boolean);
    o.availableIn = [...new Set([...primary,...alt])];
    o.primaryIn   = primary;
    o.credits     = parseInt(o.credits)||0;
    return o;
  });
}

function parsePlanCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  
  // Split into sections by blank line or section header
  let section = 'meta';
  const meta = {};
  const electiveReqs = {};
  const preRhit = [];
  const schedule = [];

  for (const line of lines) {
    const cells = parseCSV(line)[0] || [];
    const first = (cells[0]||'').trim();

    if (first === 'elective_requirements') { section='elec'; continue; }
    if (first === 'pre_rhit_credits')      { section='prerhit'; continue; }
    if (first === 'schedule')              { section='schedule'; continue; }
    if (first === 'plan_id' || first === 'type' || first === 'year_num' || first === 'course_id') continue; // header rows

    if (section === 'meta' && first) {
      // plan_id,plan_name,total_credits,notes
      if (first && cells[1]) {
        meta.id    = cells[0]; meta.name  = cells[1];
        meta.totalCredits = parseInt(cells[2])||0;
        meta.notes = cells[3]||'';
      }
    } else if (section === 'elec' && first) {
      electiveReqs[first] = { label: cells[1], count: parseInt(cells[2])||0 };
    } else if (section === 'prerhit' && first) {
      preRhit.push({ id:cells[0], title:cells[1], credits:parseInt(cells[2])||0 });
    } else if (section === 'schedule' && first) {
      schedule.push({
        yearNum:   parseInt(cells[0])||1,
        yearLabel: cells[1],
        quarter:   cells[2],
        courseId:  cells[3],
        title:     cells[4],
        credits:   parseInt(cells[5])||0,
        slotType:  cells[6]||'core',
      });
    }
  }
  return { meta, electiveReqs, preRhit, schedule };
}

async function loadAllData() {
  // Detect base path — same directory as this HTML file
  const base = window.location.href.replace(/\/[^\/]*$/, '/');
  
  try {
    const currText = await fetchText(base + 'ME_curriculum.csv');
    COURSES = parseCurriculumCSV(currText);
  } catch(e) {
    console.warn('Could not load ME_curriculum.csv:', e);
    COURSES = [];
  }

  for (const p of PLAN_FILES) {
    try {
      const text = await fetchText(base + p.file);
      PLANS[p.id] = parsePlanCSV(text);
      PLANS[p.id].meta.id   = p.id;
      PLANS[p.id].meta.name = p.name;
    } catch(e) {
      console.warn('Could not load', p.file, e);
    }
  }

  // Supplement COURSES with any core/hssa/capstone course IDs that appear in plan
  // schedules but have no entry in ME_curriculum.csv (e.g. MA 105/106/107, ES 205).
  // This ensures they appear in the left panel and can be scheduled.
  const knownIds = new Set(COURSES.map(c=>c.course_id));
  Object.values(PLANS).forEach(plan=>{
    (plan.schedule||[]).forEach(s=>{
      if (!s.courseId || knownIds.has(s.courseId)) return;
      if (!['core','hssa','capstone'].includes(s.slotType)) return;
      if (s.courseId==='EM or ME 306') return; // composite placeholder, not a real course
      // Build a minimal course object so it participates in scheduling
      const primary = s.quarter==='Summer' ? 'Summer' : s.quarter;
      COURSES.push({
        course_id:    s.courseId,
        title:        s.title || s.courseId,
        credits:      s.credits || 4,
        year:         s.yearLabel,
        primary_quarter: primary,
        alternate_quarters: '',
        prerequisites: '',
        notes:        'Added from plan schedule',
        prereqGroups: [],
        availableIn:  [primary],
        primaryIn:    [primary],
      });
      knownIds.add(s.courseId);
    });
  });
}

// ═══════════════════════════════════════════════════════════
let courseStates  = {};  // id -> 0,1,2
let electiveDone  = {};  // key -> count
let controlChoice = 'EM 306';
let showSummer    = false;
let currentMode   = 'suggest';

// Build grid: 6 years × 4 quarters (F/W/Sp/Su)
let buildGrid = [];
function initGrid() {
  buildGrid = [];
  for (let y=0;y<6;y++) buildGrid.push([[],[],[],[]]);
}
initGrid();

const ALL_QUARTERS = ['Fall','Winter','Spring','Summer'];
const YEAR_NAMES   = ['Freshman','Sophomore','Junior','Senior','5th Year','6th Year'];

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function getState(id) { return courseStates[id]||0; }

function satisfied() {
  const s = new Set(COURSES.filter(c=>getState(c.course_id)>=1).map(c=>c.course_id));
  // Also count CHEM 111 / BIO 101 as mutual satisfiers for downstream prereqs
  if (s.has('CHEM 111') || s.has('BIO 101')) { s.add('CHEM 111'); s.add('BIO 101'); }
  // Pre-RHIT credits count as satisfied from the start for the active plan
  const plan = activePlan();
  if (plan && plan.preRhit) {
    plan.preRhit.forEach(c=>{ if(c.id) s.add(c.id); });
    if (s.has('CHEM 111') || s.has('BIO 101')) { s.add('CHEM 111'); s.add('BIO 101'); }
  }
  // Plan-specific course equivalencies:
  // Calculus ABC uses MA 105/106/107 in place of MA 111/112/113.
  // Treat them as satisfying each other's prereq slots so downstream courses unlock.
  if (s.has('MA 105') || s.has('MA 111')) { s.add('MA 105'); s.add('MA 111'); }
  if (s.has('MA 106') || s.has('MA 112')) { s.add('MA 106'); s.add('MA 112'); }
  if (s.has('MA 107') || s.has('MA 113')) { s.add('MA 107'); s.add('MA 113'); }
  // ES 205 (Calculus ABC) is equivalent to ES 305 (Standard) for downstream prereqs
  if (s.has('ES 205') || s.has('ES 305')) { s.add('ES 205'); s.add('ES 305'); }
  return s;
}

function prereqsMet(course, sat) {
  if (!course.prereqGroups || !course.prereqGroups.length) return true;
  return course.prereqGroups.every(grp => grp.some(id => sat.has(id)));
}

function availInQ(course, q) { return course.availableIn.includes(q); }
function isAlt(course, q)    { return !course.primaryIn.includes(q); }
function courseById(id)       { return COURSES.find(c=>c.course_id===id); }

function activePlan()   { return PLANS[activePlanId]; }
function activeElecReqs() { return activePlan()?.electiveReqs || {}; }

function getPlanYearNames() {
  const plan = activePlan();
  if (!plan) return YEAR_NAMES;
  // Preserve insertion order from plan schedule (year_num order)
  const seen = new Set();
  const ys = [];
  plan.schedule.slice().sort((a,b)=>a.yearNum-b.yearNum).forEach(s=>{
    if(s.yearLabel && !seen.has(s.yearLabel)){ seen.add(s.yearLabel); ys.push(s.yearLabel); }
  });
  const base = ys.length > 0 ? ys : YEAR_NAMES.slice(0,4);
  // Append extended years if not already present
  ['5th Year','6th Year'].forEach(y=>{ if(!seen.has(y)) base.push(y); });
  return base.slice(0,6);
}

function displayQuarters() {
  return showSummer ? ALL_QUARTERS : ['Fall','Winter','Spring'];
}

function buildPlanTabs() {
  const tabs = document.getElementById('planTabs');
  tabs.innerHTML = '';
  PLAN_FILES.forEach(p => {
    if (!PLANS[p.id]) return;
    const b = document.createElement('button');
    b.className = 'plan-tab' + (p.id===activePlanId?' active':'');
    b.textContent = p.name;
    b.onclick = () => switchPlan(p.id);
    tabs.appendChild(b);
  });
}

function buildYearSelect() {
  const sel = document.getElementById('startYear');
  sel.innerHTML = '';
  getPlanYearNames().forEach(y => {
    const o = document.createElement('option'); o.value=y; o.textContent=y; sel.appendChild(o);
  });
}

function buildElectiveCounters() {
  const el = document.getElementById('electiveCounters');
  el.innerHTML = '';
  const reqs = activeElecReqs();
  Object.entries(reqs).forEach(([key,req]) => {
    if (!req.count) return;
    if (!electiveDone[key]) electiveDone[key] = 0;
    const row = document.createElement('div'); row.className='config-row';
    row.innerHTML = `<label style="font-size:10px">${req.label}</label>
      <div class="counter-ctrl">
        <button class="counter-btn" id="${key}Minus" onclick="changeCounter('${key}',-1)">−</button>
        <span class="counter-val" id="${key}Val">${electiveDone[key]||0}</span>
        <button class="counter-btn" id="${key}Plus"  onclick="changeCounter('${key}', 1)">+</button>
        <span class="counter-of">/ ${req.count}</span>
      </div>`;
    el.appendChild(row);
  });
  syncCounterBtns();
}

function buildCourseList() {
  const list = document.getElementById('courseList');
  list.innerHTML = '';
  // Group courses by their standard year in the active plan
  const plan = activePlan();
  if (!plan) return;

  // Gather unique course IDs referenced in this plan (core only, no elective slots)
  // Expand 'EM or ME 306' placeholder into both real course IDs so they appear in the list
  // Exclude pre-RHIT courses — they don't need manual tracking by the student
  const preRhitIdSet = new Set((plan.preRhit||[]).map(c=>c.id).filter(Boolean));
  const rawPlanIds = plan.schedule
    .filter(s=>s.slotType==='core'||s.slotType==='hssa'||s.slotType==='capstone')
    .map(s=>s.courseId).filter(id=>id&&!id.includes('Elective'));
  const planCourseIds = [...new Set(rawPlanIds.flatMap(id=>
    id==='EM or ME 306' ? ['EM 306','ME 306'] : [id]
  ))].filter(id=>!preRhitIdSet.has(id));

  // Map courseId -> yearLabel from plan schedule
  const idToYear = {};
  plan.schedule.forEach(s=>{
    if (s.courseId && !idToYear[s.courseId]) idToYear[s.courseId] = s.yearLabel;
  });

  // Group by year
  const byYear = {};
  planCourseIds.forEach(id => {
    const yr = idToYear[id] || 'Other';
    if (!byYear[yr]) byYear[yr] = [];
    const c = courseById(id);
    if (c) byYear[yr].push(c);
    else byYear[yr].push({course_id:id, title:id, credits:0, availableIn:[], primaryIn:[], prereqGroups:[]});
  });

  // Also include EM 306 / ME 306 depending on choice
  const ctrlYr = idToYear['EM 306'] || idToYear['ME 306'] || 'Junior';
  if (!byYear[ctrlYr]) byYear[ctrlYr]=[];
  ['EM 306','ME 306'].forEach(id=>{
    const c=courseById(id);
    if (c && !byYear[ctrlYr].find(x=>x.course_id===id)) byYear[ctrlYr].push(c);
  });

  getPlanYearNames().slice(0,4).forEach(yr=>{
    const courses=(byYear[yr]||[]).filter(c=>{
      if (c.course_id==='EM 306' && controlChoice!=='EM 306') return false;
      if (c.course_id==='ME 306' && controlChoice!=='ME 306') return false;
      return true;
    });
    if (!courses.length) return;
    const g=document.createElement('div'); g.className='year-group';
    const lbl=document.createElement('div'); lbl.className='year-label'; lbl.textContent=yr;
    g.appendChild(lbl);
    courses.forEach(c=>{
      const st=getState(c.course_id);
      const item=document.createElement('div');
      item.className='course-item s'+st;
      const safe=c.course_id.replace(/'/g,"\\'");
      item.innerHTML=`<div class="state-btn s${st}" onclick="cycleState('${safe}')">${st===0?'':st===1?'–':'✓'}</div>
        <div class="course-info"><div class="course-id">${c.course_id}</div><div class="course-name">${c.title}</div></div>
        <div class="course-credits">${c.credits||''}cr</div>`;
      g.appendChild(item);
    });
    list.appendChild(g);
  });
  syncCounterBtns();
}

function switchPlan(id) {
  activePlanId = id;
  document.querySelectorAll('.plan-tab').forEach(b=>b.classList.toggle('active',b.textContent===PLAN_FILES.find(p=>p.id===id)?.name));
  electiveDone = {};
  buildYearSelect();
  buildElectiveCounters();
  buildCourseList();
  if (currentMode==='build') renderBuild();
  else {
    document.getElementById('suggestPanel').innerHTML=`<div class="empty-state"><div class="icon">◳</div><p>Plan switched to <strong>${PLANS[id]?.meta?.name||id}</strong>. Mark completed courses then click <strong>Generate plan</strong>.</p></div>`;
  }
}

function switchMode(mode) {
  currentMode=mode;
  document.getElementById('tab-suggest').classList.toggle('active',mode==='suggest');
  document.getElementById('tab-build').classList.toggle('active',mode==='build');
  document.getElementById('suggestPanel').style.display=mode==='suggest'?'flex':'none';
  document.getElementById('buildPanel').style.display=mode==='build'?'flex':'none';
  document.getElementById('targetRow').style.display=mode==='suggest'?'':'none';
  document.getElementById('mainBtn').textContent=mode==='suggest'?'Generate plan →':'Validate plan ✓';
  if (mode==='build') renderBuild();
}

function handleMain() {
  if (currentMode==='suggest') generatePlan(); else renderBuild(true);
}

function setControl(val) {
  controlChoice=val;
  document.querySelectorAll('.toggle-opt[data-val]').forEach(b=>{
    if (b.dataset.val==='EM 306'||b.dataset.val==='ME 306') b.classList.toggle('active',b.dataset.val===val);
  });
  buildCourseList();
  if (currentMode==='build') renderBuild();
}

function setSummer(val) {
  showSummer=(val==='yes');
  document.querySelectorAll('.toggle-opt[data-val="yes"],.toggle-opt[data-val="no"]').forEach(b=>{
    b.classList.toggle('active',b.dataset.val===val);
  });
  if (currentMode==='build') renderBuild();
}

function changeCounter(key,d) {
  const req=activeElecReqs()[key];
  if (!req) return;
  electiveDone[key]=Math.max(0,Math.min(req.count,(electiveDone[key]||0)+d));
  const v=document.getElementById(key+'Val'); if(v) v.textContent=electiveDone[key];
  syncCounterBtns();
}

function syncCounterBtns() {
  const reqs=activeElecReqs();
  Object.entries(reqs).forEach(([k,req])=>{
    const m=document.getElementById(k+'Minus'); const p=document.getElementById(k+'Plus');
    if(m) m.disabled=(electiveDone[k]||0)===0;
    if(p) p.disabled=(electiveDone[k]||0)===req.count;
  });
}

function cycleState(id) {
  courseStates[id]=((courseStates[id]||0)+1)%3;
  if(!courseStates[id]) delete courseStates[id];
  buildCourseList();
  if(currentMode==='build') renderBuild();
}

function clearAll() {
  courseStates={};
  electiveDone={};
  Object.keys(activeElecReqs()).forEach(k=>{
    const v=document.getElementById(k+'Val'); if(v) v.textContent=0;
  });
  syncCounterBtns();
  initGrid();
  buildCourseList();
  if(currentMode==='suggest'){
    document.getElementById('suggestPanel').innerHTML=`<div class="empty-state"><div class="icon">◳</div><p>Mark completed courses then click <strong>Generate plan</strong>.</p></div>`;
  } else renderBuild();
}

// ═══════════════════════════════════════════════════════════
//  SUGGEST MODE — scheduler
// ═══════════════════════════════════════════════════════════
function generatePlan() {
  const startQ  = document.getElementById('startQuarter').value;
  const startYr = document.getElementById('startYear').value;
  const target  = Math.max(12,Math.min(18,parseInt(document.getElementById('targetCredits').value)||16));
  const plan    = activePlan();
  if (!plan) return;

  // Build ordered quarter sequence (up to 6 years × 4 quarters)
  const yearNames = getPlanYearNames();
  const sy = yearNames.indexOf(startYr);
  const sqIdx = ALL_QUARTERS.indexOf(startQ);
  const allQ = [];
  const safeYi = Math.max(0, sy); // guard against -1 if year name not found
  // Determine which quarters to iterate for scheduling.
  // Summer is always included in the scheduling sequence if the active plan
  // has any Summer slots (e.g. Calculus ABC's required MA 113 summer).
  // This is independent of the showSummer display toggle.
  const planHasSummer = plan.schedule.some(s=>s.quarter==='Summer');
  const schedQuarters = (showSummer || planHasSummer) ? ALL_QUARTERS : ['Fall','Winter','Spring'];
  for (let yi=safeYi;yi<yearNames.length;yi++)
    for (let qi=0;qi<schedQuarters.length;qi++){
      const quarter=schedQuarters[qi];
      // For the starting year, skip quarters before the start quarter
      if (yi===safeYi && ALL_QUARTERS.indexOf(quarter)<sqIdx) continue;
      allQ.push({year:yearNames[yi],quarter,yi,qi:ALL_QUARTERS.indexOf(quarter)});
    }

  // Courses needing scheduling (state=0, excluding unchosen control and pre-RHIT courses)
  // Plan CSVs use 'EM or ME 306' as placeholder — match against chosen control course
  const preRhitIds = new Set((plan.preRhit||[]).map(c=>c.id).filter(Boolean));
  const needed = COURSES.filter(c=>{
    if (getState(c.course_id)!==0) return false;
    if (preRhitIds.has(c.course_id)) return false; // already satisfied as pre-RHIT credit
    if (c.course_id==='EM 306' && controlChoice!=='EM 306') return false;
    if (c.course_id==='ME 306' && controlChoice!=='ME 306') return false;
    const inPlan = plan.schedule.some(s=>
      s.courseId===c.course_id ||
      (s.courseId==='EM or ME 306' && c.course_id===controlChoice)
    );
    return inPlan;
  });

  // Electives still needed — count from plan schedule slots (authoritative),
  // subtract how many the student has already completed.
  const reqs = activeElecReqs();
  // Count elective slots defined in this plan's schedule
  const planElecSlots = {};
  plan.schedule.forEach(s=>{
    if (!s.slotType.startsWith('elective')) return;
    const k = s.slotType.replace('elective-','');
    planElecSlots[k] = (planElecSlots[k]||0) + 1;
  });
  const eLeft = {};
  // Use plan slot count as the total needed; fall back to reqs count if plan has no slots
  Object.keys({...reqs,...planElecSlots}).forEach(k=>{
    const totalNeeded = planElecSlots[k] || reqs[k]?.count || 0;
    eLeft[k] = Math.max(0, totalNeeded - (electiveDone[k]||0));
  });

  // Standard year lookup (from plan schedule)
  // Map both the real course IDs and the composite 'EM or ME 306' placeholder
  const stdYear = {};
  plan.schedule.forEach(s=>{
    if(!stdYear[s.courseId]) stdYear[s.courseId]=yearNames.indexOf(s.yearLabel);
    // Map composite control-course placeholder to the chosen course
    if(s.courseId==='EM or ME 306') stdYear[controlChoice]=yearNames.indexOf(s.yearLabel);
  });

  let sat = satisfied();
  let remaining = [...needed];
  const eScheduled = {};
  Object.keys(eLeft).forEach(k=>eScheduled[k]=0);
  const schedule = [];
  const delayed  = new Set();

  for (const {year,quarter,yi} of allQ) {
    const qCourses=[]; let qCr=0;

    // Eligible courses: available this quarter + prereqs met.
    // No hard year gate — a student ready for upper-level work can take it early.
    const eligible=remaining.filter(c=>
      availInQ(c,quarter) && prereqsMet(c,sat)
    );
    eligible.sort((a,b)=>{
      const aStd=stdYear[a.course_id]??99, bStd=stdYear[b.course_id]??99;
      // Overdue courses (plan year already passed) come first
      const aLate=aStd<yi?1:0, bLate=bStd<yi?1:0;
      if (aLate!==bLate) return bLate-aLate;
      // Then prefer courses from earlier plan years (stay close to standard sequence)
      if (aStd!==bStd) return aStd-bStd;
      // Capstones last within a year
      if (a.type==='capstone'&&b.type!=='capstone') return 1;
      if (b.type==='capstone'&&a.type!=='capstone') return -1;
      // Primary quarter before alternate
      return (isAlt(a,quarter)?1:0)-(isAlt(b,quarter)?1:0);
    });

    for (const c of eligible) {
      if (qCr+c.credits>18) continue;
      if (stdYear[c.course_id]!==undefined && stdYear[c.course_id]<yi) delayed.add(c.course_id);
      qCourses.push(c);
      qCr+=c.credits;
      sat=new Set([...sat,c.course_id]);
      // Expand equivalencies so downstream prereqs unlock correctly
      if(sat.has('MA 105')||sat.has('MA 111')){sat.add('MA 105');sat.add('MA 111');}
      if(sat.has('MA 106')||sat.has('MA 112')){sat.add('MA 106');sat.add('MA 112');}
      if(sat.has('MA 107')||sat.has('MA 113')){sat.add('MA 107');sat.add('MA 113');}
      if(sat.has('ES 205')||sat.has('ES 305')){sat.add('ES 205');sat.add('ES 305');}
      if(sat.has('CHEM 111')||sat.has('BIO 101')){sat.add('CHEM 111');sat.add('BIO 101');}
      remaining=remaining.filter(x=>x.course_id!==c.course_id);
      if (qCr>=target) break;
    }

    // Fill electives from plan's scheduled positions
    // Use plan schedule as a guide for which electives go where
    const planQSlots=plan.schedule.filter(s=>s.yearLabel===year&&s.quarter===quarter&&s.slotType.startsWith('elective'));
    planQSlots.forEach(slot=>{
      const key=slot.slotType.replace('elective-','');
      if (eScheduled[key]!==undefined && eScheduled[key]<(eLeft[key]||0) && qCr+4<=18) {
        qCourses.push({course_id:slot.courseId||slot.slotType, title:slot.title||reqs[key]?.label||key, credits:4, type:slot.slotType});
        qCr+=4; eScheduled[key]++;
      }
    });

    // Any remaining electives not yet placed — fill greedily
    if (quarter!=='Summer') {
      Object.entries(eLeft).forEach(([k,need])=>{
        while (eScheduled[k]<need && qCr+4<=18) {
          qCourses.push({course_id:k+' Elective',title:reqs[k]?.label||k,credits:4,type:'elective-'+k});
          qCr+=4; eScheduled[k]++;
          if (qCr>=target) return;
        }
      });
    }

    if (qCourses.length>0) schedule.push({year,quarter,courses:qCourses,credits:qCr});

    const done=remaining.length===0&&Object.keys(eLeft).every(k=>eScheduled[k]>=(eLeft[k]||0));
    if (done) break;
  }

  renderSuggest(schedule,startQ,startYr,target,delayed,plan);
}

// ═══════════════════════════════════════════════════════════
//  SUGGEST MODE — render
// ═══════════════════════════════════════════════════════════
function renderSuggest(schedule,startQ,startYr,target,delayed,plan) {
  const panel=document.getElementById('suggestPanel');
  const byYear={};
  schedule.forEach(q=>{(byYear[q.year]=byYear[q.year]||[]).push(q);});

  const totRem=schedule.reduce((s,q)=>s+q.credits,0);
  const preRhitCr=(plan.preRhit||[]).reduce((s,c)=>s+(c.credits||0),0);
  const totDone=COURSES.reduce((s,c)=>getState(c.course_id)===2?s+c.credits:s,0)
    +Object.entries(electiveDone).reduce((s,[k,v])=>s+v*4,0)
    +preRhitCr;
  const inProg=COURSES.filter(c=>getState(c.course_id)===1);
  const years=[...new Set(schedule.map(q=>q.year))];
  const extYears=years.filter(y=>getPlanYearNames().indexOf(y)>=4);
  const planHasSummerCourses = plan.schedule.some(s=>s.quarter==='Summer' && s.slotType!=='elective');
  const quarters=(showSummer||planHasSummerCourses)?ALL_QUARTERS:['Fall','Winter','Spring'];

  let html=`<div class="plan-container">`;
  html+=`<div class="summary-bar">
    <span class="summary-stat"><strong>${schedule.length}</strong> quarters planned</span>
    <span class="summary-stat"><strong>${totRem}</strong> cr remaining</span>
    <span class="summary-stat"><strong>${totDone}</strong> cr completed</span>
    <span class="summary-stat">Target <strong>${target}</strong> cr/qtr</span>
    <span class="summary-stat">Plan: <strong>${plan.meta.name}</strong></span>
  </div>`;

  if (inProg.length) html+=`<div class="info-box amber"><strong>In progress:</strong> ${inProg.map(c=>c.course_id).join(', ')} — treated as complete for prerequisites.</div>`;
  if (delayed.size)  html+=`<div class="info-box purple"><strong>Rescheduled:</strong> ${[...delayed].join(', ')} placed later than standard due to unmet prerequisites or credit limits.</div>`;
  if (extYears.length) html+=`<div class="info-box amber"><strong>Extended enrollment:</strong> This plan requires ${extYears.join(' and ')}.</div>`;
  if (schedule.some(q=>q.credits<12||q.credits>18)) html+=`<div class="info-box red"><strong>Note:</strong> Some quarters fall outside the 12–18 credit range.</div>`;
  if (plan.meta.notes) html+=`<div class="info-box blue"><strong>Plan note:</strong> ${plan.meta.notes}</div>`;

  years.forEach(yr=>{
    const qs=byYear[yr]; if(!qs||!qs.length) return;
    const isExt=getPlanYearNames().indexOf(yr)>=4;
    const hasSummer=showSummer&&qs.some(q=>q.quarter==='Summer');
    html+=`<div class="plan-year-header ${isExt?'extended':''}">${yr}${isExt?' — Extended Enrollment':''}</div>`;
    html+=`<div class="quarters-row ${hasSummer?'with-summer':''}">`;
    quarters.forEach(qName=>{
      const qd=qs.find(q=>q.quarter===qName);
      const isNext=yr===startYr&&qName===startQ;
      const isSummer=qName==='Summer';
      const crClass=qd?(qd.credits<12?'under':qd.credits>18?'over':'ok'):'';
      html+=`<div class="quarter-col ${isSummer?'summer-col':''}"><div class="quarter-header">
        <span class="quarter-name ${isSummer?'summer-name':''}">${qName}${isNext?'<span class="current-marker">next</span>':''}</span>
        ${qd?`<span class="quarter-credits ${crClass}">${qd.credits} cr</span>`:''}
      </div>`;
      if (qd&&qd.courses.length) {
        html+=`<div class="course-cards">`;
        qd.courses.forEach(c=>{
          const cObj=courseById(c.course_id);
          const alt=cObj&&isAlt(cObj,qName);
          const isDel=delayed.has(c.course_id);
          const cardType=c.type||'core';
          html+=`<div class="plan-card ${cardType} ${isSummer?'summer-card':''}">
            <div class="plan-card-id">${c.course_id}</div>
            <div class="plan-card-name">${c.title}</div>
            <div class="plan-card-meta">
              <span class="plan-card-cr">${c.credits} cr</span>
              <span>${alt?'<span class="alt-badge">alt</span>':''}${isDel?'<span class="delayed-badge">delayed</span>':''}</span>
            </div></div>`;
        });
        html+=`</div>`;
      } else html+=`<div class="no-courses">—</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  });

  // Pre-RHIT credits section
  if (plan.preRhit && plan.preRhit.length) {
    html+=`<div class="pre-rhit-section"><div class="pre-rhit-header">Pre-RHIT / Transfer Credits</div><div class="pre-rhit-cards">`;
    plan.preRhit.forEach(c=>{
      html+=`<div class="plan-card core" style="min-width:140px">
        <div class="plan-card-id">${c.id||'—'}</div>
        <div class="plan-card-name">${c.title||c.id}</div>
        <div class="plan-card-cr">${c.credits} cr</div></div>`;
    });
    html+=`</div></div>`;
  }

  html+=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Core ME</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>HSSA</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8B4513"></div>Capstone</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-mid)"></div>Technical elective</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Math/sci elective</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>Free elective</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--summer)"></div>Summer</div>
  </div></div>`;

  panel.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
//  BUILD MODE
// ═══════════════════════════════════════════════════════════
function unplacedCourses() {
  const placed=new Set();
  buildGrid.forEach(yr=>yr.forEach(q=>q.forEach(s=>{if(s.kind==='course')placed.add(s.id);})));
  const plan=activePlan();
  const preRhitIds=new Set((plan?.preRhit||[]).map(c=>c.id).filter(Boolean));
  return COURSES.filter(c=>{
    if (getState(c.course_id)>=1) return false;
    if (preRhitIds.has(c.course_id)) return false;
    if (c.course_id==='EM 306'&&controlChoice!=='EM 306') return false;
    if (c.course_id==='ME 306'&&controlChoice!=='ME 306') return false;
    if (placed.has(c.course_id)) return false;
    if (plan&&!plan.schedule.some(s=>
      s.courseId===c.course_id ||
      (s.courseId==='EM or ME 306' && c.course_id===controlChoice)
    )) return false;
    return true;
  });
}

function addToCell(yi,qi,val) {
  if (!val) return;
  if (val.startsWith('__elec__')) {
    buildGrid[yi][qi].push({kind:'elective',electiveType:val.replace('__elec__','')});
  } else {
    for(let y=0;y<6;y++) for(let q=0;q<4;q++)
      if(buildGrid[y][q].some(s=>s.kind==='course'&&s.id===val)) return;
    buildGrid[yi][qi].push({kind:'course',id:val});
  }
  renderBuild();
}

function removeFromCell(yi,qi,idx) {
  buildGrid[yi][qi].splice(idx,1);
  renderBuild();
}

function renderBuild() {
  const panel=document.getElementById('buildPanel');
  const plan=activePlan();
  const yearNames=getPlanYearNames();
  const reqs=activeElecReqs();
  const quarters=showSummer?ALL_QUARTERS:['Fall','Winter','Spring'];

  // Simulate prereq satisfaction quarter by quarter
  const sat0=satisfied();
  const qSatMap=[];
  let runSat=new Set(sat0);
  for(let y=0;y<6;y++) for(let q=0;q<4;q++){
    qSatMap.push(new Set(runSat));
    buildGrid[y][q].forEach(s=>{if(s.kind==='course')runSat.add(s.id);});
  }

  // Count placed electives
  const ePlaced={};
  Object.keys(reqs).forEach(k=>ePlaced[k]=0);
  buildGrid.forEach(yr=>yr.forEach(q=>q.forEach(s=>{
    if(s.kind==='elective'&&ePlaced[s.electiveType]!==undefined) ePlaced[s.electiveType]++;
  })));
  const eTotal={};
  Object.keys(reqs).forEach(k=>eTotal[k]=(electiveDone[k]||0)+(ePlaced[k]||0));

  // Core completion
  const planCores=plan?plan.schedule.filter(s=>['core','hssa','capstone'].includes(s.slotType)).map(s=>s.courseId).filter(id=>id&&!id.includes('or ME')&&!id.includes('Elective')):[];
  const coreDone=planCores.filter(id=>{
    if(getState(id)>=1) return true;
    for(let y=0;y<6;y++) for(let q=0;q<4;q++) if(buildGrid[y][q].some(s=>s.kind==='course'&&s.id===id)) return true;
    return false;
  });

  let html=`<div class="plan-container"><div class="build-summary">`;
  const cStatus=coreDone.length===planCores.length?'met':coreDone.length>0?'partial':'unmet';
  html+=`<span class="req-badge ${cStatus}">Core: ${coreDone.length}/${planCores.length}</span>`;
  Object.entries(reqs).forEach(([k,req])=>{
    const have=eTotal[k]||0;
    const cls=have>=req.count?'met':have>0?'partial':'unmet';
    html+=`<span class="req-badge ${cls}">${(req.label||k).split(' ')[0]}: ${have}/${req.count}</span>`;
  });
  html+=`</div>`;

  for(let y=0;y<6;y++){
    const hasContent=buildGrid[y].some(q=>q.length>0);
    if(y>=4&&!hasContent) continue;
    const isExt=y>=4;
    html+=`<div class="plan-year-header ${isExt?'extended':''}">${yearNames[y]}${isExt?' — Extended Enrollment':''}</div>`;
    html+=`<div class="quarters-row${showSummer?' with-summer':''}">`;

    quarters.forEach((qName,qi_display)=>{
      const qi=ALL_QUARTERS.indexOf(qName);
      const slots=buildGrid[y][qi];
      const qSat=qSatMap[y*4+qi];
      const isSummer=qName==='Summer';
      let qCr=0;
      slots.forEach(s=>{if(s.kind==='course'){const c=courseById(s.id);if(c)qCr+=c.credits;}else qCr+=4;});
      const crClass=qCr===0?'':qCr<12?'under':qCr>18?'over':'ok';

      html+=`<div class="build-quarter ${isSummer?'summer-col':''}">`;
      html+=`<div class="quarter-header"><span class="quarter-name ${isSummer?'summer-name':''}">${qName}</span>
        ${qCr>0?`<span class="quarter-credits ${crClass}">${qCr} cr</span>`:''}</div>`;
      html+=`<div class="course-cards">`;

      slots.forEach((s,idx)=>{
        if(s.kind==='course'){
          const c=courseById(s.id);
          if(!c){html+=`<div class="build-card"><div class="build-card-body"><div class="build-card-id">${s.id}</div></div><button class="remove-btn" onclick="removeFromCell(${y},${qi},${idx})">×</button></div>`;return;}
          const pOk=prereqsMet(c,qSat);
          const aOk=availInQ(c,qName);
          let cls='build-card';
          if(!pOk&&!aOk)cls+=' err-both'; else if(!pOk)cls+=' err-prereq'; else if(!aOk)cls+=' err-avail';
          let errs='';
          if(!pOk){const miss=c.prereqGroups.filter(g=>!g.some(id=>qSat.has(id))).map(g=>g.join(' or '));errs+=`<div class="build-err">Missing: ${miss.join('; ')}</div>`;}
          if(!aOk){const off=(c.primary_quarter+(c.alternate_quarters?'; '+c.alternate_quarters:'')).split(/[;|]/).map(s=>s.trim()).join(', ');errs+=`<div class="build-warn">Not offered ${qName} (offered: ${off})</div>`;}
          html+=`<div class="${cls}"><div class="build-card-body"><div class="build-card-id">${c.course_id}</div><div class="build-card-name">${c.title}</div><div class="build-card-cr">${c.credits} cr</div>${errs}</div><button class="remove-btn" onclick="removeFromCell(${y},${qi},${idx})">×</button></div>`;
        } else {
          const meta=reqs[s.electiveType]||{label:s.electiveType};
          html+=`<div class="build-card"><div class="build-card-body"><div class="build-card-id">${s.electiveType.toUpperCase()}</div><div class="build-card-name">${meta.label||s.electiveType}</div><div class="build-card-cr">4 cr</div></div><button class="remove-btn" onclick="removeFromCell(${y},${qi},${idx})">×</button></div>`;
        }
      });
      html+=`</div>`;

      // Add dropdown
      const avail=unplacedCourses().filter(c=>availInQ(c,qName));
      const notAvail=unplacedCourses().filter(c=>!availInQ(c,qName));
      html+=`<select class="add-select" onchange="addToCell(${y},${qi},this.value);this.value=''"><option value="">+ add…</option>`;
      if(avail.length){html+=`<optgroup label="Available in ${qName}">`;avail.forEach(c=>{html+=`<option value="${c.course_id}">${c.course_id} — ${c.title} (${c.credits}cr)</option>`;});html+=`</optgroup>`;}
      if(notAvail.length){html+=`<optgroup label="Not normally offered (will flag)">`;notAvail.forEach(c=>{html+=`<option value="${c.course_id}">${c.course_id} — ${c.title}</option>`;});html+=`</optgroup>`;}
      html+=`<optgroup label="Elective slots">`;
      Object.entries(reqs).forEach(([k,req])=>{
        const rem=Math.max(0,req.count-(eTotal[k]||0));
        if(rem>0) html+=`<option value="__elec__${k}">${req.label} (${rem} left)</option>`;
      });
      html+=`</optgroup></select>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="legend">
    <div class="legend-item"><div style="width:8px;height:8px;background:var(--accent-light);border:1px solid #e8b0b0;border-radius:1px"></div>Missing prereq</div>
    <div class="legend-item"><div style="width:8px;height:8px;background:var(--amber-light);border:1px solid var(--amber-border);border-radius:1px"></div>Wrong quarter</div>
  </div></div>`;

  panel.innerHTML=html;
}

  try {
    await loadAllData();
  } catch(e) {
    console.error('Load error:', e);
  }
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appHeader').style.display='flex';
  document.getElementById('appBody').style.display='flex';
  buildPlanTabs();
  buildYearSelect();
  buildElectiveCounters();
  buildCourseList();
})();
</script>
